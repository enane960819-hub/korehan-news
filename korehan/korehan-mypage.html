<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Page — KoreHan News</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@400;600;700;900&family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="korehan-shared.css">
<style>
.mypage-hero {
  background: linear-gradient(135deg,#0b1626,#1a3a6b);
  padding: 36px 22px 28px; color:#fff; overflow:hidden;
}
.mypage-hero-inner { max-width:1100px; margin:0 auto; display:flex; align-items:center; gap:18px; }
.mypage-avatar { width:72px; height:72px; border-radius:50%; border:3px solid rgba(255,255,255,0.3); object-fit:cover; }
.mypage-avatar-placeholder { width:72px; height:72px; border-radius:50%; background:rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; font-size:32px; }
.mypage-name { font-family:'Noto Serif KR','Playfair Display',serif; font-size:24px; font-weight:900; margin:0 0 4px; }
.mypage-email { font-size:13px; color:rgba(255,255,255,0.6); margin:0 0 10px; }
.mypage-signout { font-size:12px; color:rgba(255,255,255,0.5); background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:999px; padding:4px 12px; cursor:pointer; font-family:inherit; }
.mypage-signout:hover { background:rgba(255,255,255,0.18); color:#fff; }

.mypage-body { max-width:1100px; margin:0 auto; padding:28px 22px 60px; }

/* STATS */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:32px; }
.stat-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:20px; text-align:center; box-shadow:var(--shadow); }
.stat-num { font-family:'Playfair Display',serif; font-size:40px; font-weight:900; color:var(--accent); line-height:1; }
.stat-fire { font-size:36px; line-height:1; }
.stat-label { font-size:12px; color:var(--gray); margin-top:6px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }

/* TABS */
.my-tabs { display:flex; gap:6px; border-bottom:2px solid var(--border); margin-bottom:24px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; flex-wrap:nowrap; }
.my-tabs::-webkit-scrollbar { display:none; }
.my-tab { padding:9px 16px; border:none; background:none; font-size:14px; font-weight:700; color:var(--gray); cursor:pointer; font-family:inherit; border-bottom:3px solid transparent; margin-bottom:-2px; border-radius:6px 6px 0 0; transition:all .15s; white-space:nowrap; flex-shrink:0; }
.my-tab:hover { color:var(--bright); }
.my-tab.on { color:var(--bright); border-bottom-color:var(--bright); background:rgba(34,85,164,0.04); }
.my-panel { display:none; }
.my-panel.on { display:block; }

/* QUIZ */
.quiz-wrap2 { background:#fff; border:1px solid var(--border); border-radius:12px; padding:28px; box-shadow:var(--shadow); max-width:560px; }
.quiz-q2 { font-family:'Noto Serif KR','Playfair Display',serif; font-size:44px; font-weight:900; text-align:center; color:var(--accent); margin-bottom:8px; }
.quiz-rom2 { text-align:center; font-size:13px; color:var(--gray); font-style:italic; margin-bottom:20px; }
.quiz-opts2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.quiz-opt2 { padding:13px; border:2px solid var(--border); border-radius:10px; background:#fff; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; text-align:center; }
.quiz-opt2:hover { border-color:var(--bright); background:rgba(34,85,164,0.04); }
.quiz-opt2.correct { background:#d4edda; border-color:#28a745; color:#155724; }
.quiz-opt2.wrong   { background:#f8d7da; border-color:#dc3545; color:#721c24; }
.quiz-score2 { text-align:center; font-size:14px; color:var(--gray); margin-bottom:16px; font-weight:600; }
.quiz-next2 { display:block; margin:18px auto 0; padding:10px 28px; background:var(--bright); color:#fff; border:none; border-radius:999px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }

/* SAVED WORDS LIST */
.saved-word-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
.sw-ko { font-size:20px; font-weight:900; color:var(--accent); }
.sw-rom { font-size:12px; color:var(--gray); font-style:italic; }
.sw-en { font-size:14px; font-weight:600; color:var(--dark); }
.sw-del { background:none; border:none; color:#ccc; cursor:pointer; font-size:16px; padding:4px 8px; border-radius:4px; }
.sw-del:hover { color:#dc3545; background:#fff0f0; }

/* READ ARTICLES */
.read-row { display:flex; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
.read-tag { font-size:10px; font-weight:800; text-transform:uppercase; padding:2px 8px; border-radius:999px; background:rgba(34,85,164,0.1); color:var(--bright); white-space:nowrap; margin-top:3px; }
.read-title { font-size:14px; font-weight:700; color:var(--dark); text-decoration:none; }
.read-title:hover { color:var(--bright); }
.read-date { font-size:12px; color:var(--gray); margin-top:3px; }

/* EMPTY STATE */
.empty-state { text-align:center; padding:40px 20px; color:var(--gray); }
.empty-state .es-icon { font-size:40px; margin-bottom:12px; }
.empty-state p { font-size:14px; }

/* GOALS */
.goal-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:20px 22px; margin-bottom:12px; display:flex; align-items:center; gap:16px; box-shadow:var(--shadow); }
.goal-icon { font-size:28px; flex-shrink:0; }
.goal-info { flex:1; }
.goal-title { font-size:15px; font-weight:700; color:var(--dark); margin-bottom:4px; }
.goal-bar-wrap { height:8px; background:#eef0f5; border-radius:999px; overflow:hidden; }
.goal-bar { height:100%; border-radius:999px; background:linear-gradient(90deg,#2255a4,#3d7fd4); transition:width 0.6s ease; }
.goal-bar.done { background:linear-gradient(90deg,#28a745,#5cb85c); }
.goal-count { font-size:12px; color:var(--gray); margin-top:4px; font-weight:600; }
.goal-check { font-size:22px; flex-shrink:0; }

/* LEVEL TEST */
.level-badge { display:inline-flex; align-items:center; gap:8px; padding:10px 22px; border-radius:999px; font-size:15px; font-weight:900; margin-bottom:20px; }
.level-badge.beginner    { background:#e8f5e9; color:#2e7d32; }
.level-badge.intermediate{ background:#fff8e1; color:#f57f17; }
.level-badge.advanced    { background:#fce4ec; color:#c62828; }
.lv-q-wrap { background:#fff; border:1px solid var(--border); border-radius:12px; padding:24px; box-shadow:var(--shadow); max-width:540px; }
.lv-word { font-size:40px; font-weight:900; color:var(--accent); text-align:center; margin-bottom:4px; font-family:'Noto Serif KR',serif; }
.lv-rom  { text-align:center; font-size:13px; color:var(--gray); font-style:italic; margin-bottom:16px; }
.lv-opts { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.lv-opt  { padding:12px; border:2px solid var(--border); border-radius:10px; background:#fff; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; text-align:center; }
.lv-opt:hover  { border-color:var(--bright); background:#f0f4ff; }
.lv-opt.correct{ background:#d4edda; border-color:#28a745; color:#155724; }
.lv-opt.wrong  { background:#f8d7da; border-color:#dc3545; color:#721c24; }
.lv-progress   { font-size:13px; color:var(--gray); margin-bottom:16px; font-weight:600; text-align:center; }
.lv-result     { text-align:center; padding:32px; }
.lv-result-badge { font-size:56px; margin-bottom:12px; }
.lv-result-title { font-size:22px; font-weight:900; color:var(--accent); margin-bottom:8px; }
.lv-result-desc  { font-size:14px; color:var(--gray); line-height:1.7; max-width:380px; margin:0 auto 20px; }
/* ── LISTENING / QUIZ SHARED ────────────────────────────────── */
.lq-mode-btn { padding:9px 18px; border-radius:99px; border:2px solid var(--border); background:#fff; font-size:13px; font-weight:700; cursor:pointer; transition:all .2s; color:var(--accent); white-space:nowrap; }
.lq-mode-btn.on { background:var(--bright); color:#fff; border-color:var(--bright); }
.lq-wrap { background:#fff; border:1px solid var(--border); border-radius:16px; padding:24px; }
.lq-progress-bar { height:4px; background:var(--border); border-radius:99px; margin-bottom:24px; overflow:hidden; }
.lq-progress-fill { height:4px; background:linear-gradient(90deg,#2255a4,#3d7fd4); border-radius:99px; transition:width .5s; }
.lq-speaker-btn { width:96px; height:96px; border-radius:50%; background:#f0f6ff; border:3px solid #d0e4ff; font-size:38px; cursor:pointer; display:flex; align-items:center; justify-content:center; margin:0 auto 8px; transition:transform .15s,background .2s,box-shadow .2s; box-shadow:0 4px 16px rgba(34,85,164,.12); }
.lq-speaker-btn:hover { transform:scale(1.06); background:#e0edff; }
.lq-speaker-btn.playing { background:#2255a4; border-color:#2255a4; animation:lq-pulse 1s ease-in-out infinite; }
.lq-speaker-btn.playing span { filter:brightness(0) invert(1); }
@keyframes lq-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(34,85,164,.4)} 50%{box-shadow:0 0 0 14px rgba(34,85,164,0)} }
@keyframes lq-slidein { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.lq-question { font-size:17px; font-weight:800; color:#0b1626; text-align:center; margin-bottom:22px; }
.lq-choices { display:flex; flex-direction:column; gap:10px; }
.lq-choice { padding:15px 20px; border:2px solid var(--border); border-radius:14px; background:#fff; font-size:15px; font-weight:700; cursor:pointer; text-align:center; font-family:'Noto Sans KR',sans-serif; transition:border-color .15s,background .15s,transform .1s; color:#0b1626; }
.lq-choice:hover:not(:disabled) { border-color:#2255a4; background:#f0f6ff; transform:translateY(-1px); }
.lq-choice.correct { border-color:#16a34a !important; background:#f0fdf4 !important; color:#16a34a !important; }
.lq-choice.wrong   { border-color:#dc2626 !important; background:#fef2f2 !important; color:#dc2626 !important; }
.lq-choice:disabled { cursor:default; }
.lq-explanation { margin-top:14px; padding:15px 17px; background:#fffbeb; border:1.5px solid #fcd34d; border-radius:14px; animation:lq-slidein .3s ease; }
.lq-exp-title { font-size:13px; font-weight:900; color:#d97706; margin-bottom:5px; }
.lq-exp-body  { font-size:13px; color:#445566; line-height:1.65; }
.lq-next-btn  { width:100%; margin-top:14px; padding:14px; background:#2255a4; color:#fff; border:none; border-radius:14px; font-size:15px; font-weight:900; cursor:pointer; transition:background .2s; }
.lq-next-btn:hover { background:#1a3a6b; }
.lq-score-ring { width:110px; height:110px; border-radius:50%; background:linear-gradient(135deg,#2255a4,#3d7fd4); display:flex; align-items:center; justify-content:center; margin:0 auto 16px; flex-direction:column; color:#fff; }

</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="korehan-shared.js"></script>
<script>
var savedWords    = [];
var quizWords     = [];
var quizIdx       = 0;
var quizScore     = 0;
var quizTotal     = 0;
var currentAnswer = '';

// Supabase 헬퍼
function getSupaHeaders() {
  return {
    'apikey': SUPA_KEY,
    'Authorization': 'Bearer ' + SUPA_KEY,
    'Content-Type': 'application/json'
  };
}

async function dbGetSavedWords() {
  if (!supaUser) return [];
  var sb = getSupa();
  if (!sb) return [];
  var { data } = await sb.from('saved_words').select('*').eq('user_id', supaUser.id);
  return data || [];
}

async function dbGetBookmarks() {
  if (!supaUser) return [];
  var sb = getSupa();
  if (!sb) return [];
  var { data } = await sb.from('bookmarks').select('*').eq('user_id', supaUser.id).order('created_at', { ascending: false });
  return data || [];
}

function editDisplayName(el, currentName) {
  var input = document.createElement('input');
  input.type = 'text';
  input.value = currentName;
  input.style.cssText = 'font-family:inherit;font-size:22px;font-weight:900;border:none;border-bottom:2px solid #2255a4;background:transparent;color:inherit;width:220px;outline:none;padding:2px 4px;';

  function save() {
    var newName = input.value.trim();
    if (!newName) { el.textContent = currentName; el.style.display=''; return; }
    // Supabase에 저장
    if (supaUser) {
      var sb = getSupa();
      if (sb) {
        sb.auth.updateUser({ data: { full_name: newName } }).then(function(res) {
          if (!res.error) {
            toast('Name updated ✓');
            el.textContent = newName;
            el.onclick = function() { editDisplayName(el, newName); };
          } else {
            // Supabase 업데이트 실패 시 localStorage에라도 저장
            localStorage.setItem('kh_display_name', newName);
            toast('Name saved locally ✓');
            el.textContent = newName;
            el.onclick = function() { editDisplayName(el, newName); };
          }
        });
      }
    } else {
      localStorage.setItem('kh_display_name', newName);
      el.textContent = newName;
      el.onclick = function() { editDisplayName(el, newName); };
    }
    input.replaceWith(el);
  }

  input.onblur = save;
  input.onkeydown = function(e) {
    if (e.key === 'Enter') { input.blur(); }
    if (e.key === 'Escape') { input.value = currentName; input.blur(); }
  };

  el.replaceWith(input);
  input.focus();
  input.select();
}

async function dbGetLevel() {
  // 비로그인이면 localStorage에서
  if (!supaUser) return localStorage.getItem('kh_level') || null;
  var sb = getSupa();
  if (!sb) return localStorage.getItem('kh_level') || null;
  try {
    var { data } = await sb.from('user_levels').select('level').eq('user_id', supaUser.id).maybeSingle();
    var lvl = data ? data.level : null;
    if (lvl) localStorage.setItem('kh_level', lvl);
    return lvl || localStorage.getItem('kh_level') || null;
  } catch(e) { return localStorage.getItem('kh_level') || null; }
}

async function dbSaveLevel(level) {
  localStorage.setItem('kh_level', level);
  if (!supaUser) return;
  var sb = getSupa();
  if (!sb) return;
  try {

async function renderLeaderboard() {
  var area = document.getElementById('leaderboard-area');
  if (!area) return;
  area.innerHTML = '<div style="text-align:center;padding:32px;color:var(--gray)">⏳ Loading rankings...</div>';

  var sb = getSupa();
  if (!sb) { area.innerHTML = '<p style="color:red;padding:20px">Connection error</p>'; return; }

  try {
    var res = await sb.from('user_stats')
      .select('display_name, email, xp, articles_read, words_saved, quizzes_done, mission_streak, writing_tickets')
      .order('xp', { ascending: false })
      .limit(50);

    var users = res.data || [];
    var myEmail = supaUser ? supaUser.email : '';
    var myRank = users.findIndex(function(u){ return u.email === myEmail; }) + 1;

    // 티어 계산
    function getTier(xp) {
      if (xp >= 5000) return { label:'Diamond', icon:'💎', color:'#6366f1' };
      if (xp >= 2000) return { label:'Platinum', icon:'🥈', color:'#64748b' };
      if (xp >= 800)  return { label:'Gold',     icon:'🥇', color:'#f59e0b' };
      if (xp >= 300)  return { label:'Silver',   icon:'🥈', color:'#94a3b8' };
      return                  { label:'Bronze',  icon:'🥉', color:'#b45309' };
    }

    // 내 순위 카드
    var myData = users.find(function(u){ return u.email === myEmail; });
    var myTier = myData ? getTier(myData.xp||0) : getTier(0);

    var html =
      // 내 순위
      '<div style="background:linear-gradient(135deg,#0b1626,#1a3a6b);border-radius:16px;padding:20px;margin-bottom:20px;color:#fff;display:flex;align-items:center;gap:16px">'

      + '<div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:2px">' + myTier.label + ' · ' + (myData ? (myData.xp||0).toLocaleString() : '0') + ' XP</div>'

      + '<div style="text-align:right">'
      + '<div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:4px">Next tier</div>'
      + (function() {
          var xp = myData ? (myData.xp||0) : 0;
          var tiers = [[300,'Silver'],[800,'Gold'],[2000,'Platinum'],[5000,'Diamond']];

      + (users.length === 0

    return '<div style="background:' + bg + ';border:1.5px solid ' + border + ';border-radius:16px;padding:20px 22px">'
      + '<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:' + color + ';margin-bottom:10px">' + label + '</div>'
      + '<div style="display:flex;align-items:baseline;gap:6px;margin-bottom:8px">'
      + '<span style="font-size:48px;font-weight:900;color:#0b1626;line-height:1">' + remain + '</span>'
      + '<span style="font-size:14px;color:#94a3b8">/ ' + total + ' 회</span>'
      + '</div>'
      + '<div style="height:6px;background:rgba(0,0,0,.07);border-radius:99px;overflow:hidden;margin-bottom:8px">'
      + '<div style="width:' + pct + '%;height:100%;background:' + color + ';border-radius:99px;transition:width .5s"></div>'
      + '</div>'
      + '<div style="font-size:12px;color:#94a3b8">잔여 수업권</div>'

  return '<div class="pod-section">'
    + '<div class="learn-section-title" style="margin-top:0">🎟️ 수업권 현황</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'
    + card(soloR, soloT, '개인 수업', 'linear-gradient(135deg,#f0f6ff,#e0edff)', '#bfdbfe', '#2255a4', 'korehan-courses.html')
    + card(groupR, groupT, '그룹 수업', 'linear-gradient(135deg,#f0fdf4,#dcfce7)', '#bbf7d0', '#16a34a', 'korehan-courses.html')
    + '</div></div>';
}

function buildMyCalendar(base, slotMap, bookedIds) {
  var yr = base.getFullYear(), mo = base.getMonth();
  var months = [new Date(yr, mo, 1), new Date(yr, mo+1, 1)];
  var dayNames = ['일','월','화','수','목','금','토'];

  var out = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">';
  months.forEach(function(m){
    var myr = m.getFullYear(), mmo = m.getMonth();
    var dim = new Date(myr, mmo+1, 0).getDate();
    var fd  = m.getDay();
    out += '<div>'
      + '<div style="font-size:13px;font-weight:800;color:#0b1626;margin-bottom:10px">'
      + m.toLocaleString('ko-KR',{year:'numeric',month:'long'}) + '</div>'
      + '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center">';
    dayNames.forEach(function(d){ out += '<div style="font-size:10px;font-weight:700;color:#94a3b8;padding:3px">' + d + '</div>'; });
    for (var e=0; e<fd; e++) out += '<div></div>';

    for (var d=1; d<=dim; d++) {
      var ds = myr+'-'+String(mmo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      var daySlots = slotMap[ds] || [];
      var isPast   = ds < new Date().toISOString().split('T')[0];
      var hasFree  = !isPast && daySlots.some(function(s){ return !bookedIds.has(s.id) && s.booked_count < s.max_students; });
      var hasMine  = daySlots.some(function(s){ return bookedIds.has(s.id); });

      if (hasFree) {
        out += '<div style="border-radius:7px;overflow:hidden">'
          + '<button data-cal-date="' + ds + '" style="width:100%;padding:5px 2px;border:none;background:#2255a4;color:#fff;font-size:12px;font-weight:700;cursor:pointer;border-radius:7px">' + d + '</button></div>';
      } else if (hasMine) {
        out += '<div style="border-radius:7px;background:#f59e0b;padding:5px 2px;font-size:12px;font-weight:700;color:#fff">' + d + '</div>';
      } else if (isPast) {
        out += '<div style="padding:5px 2px;font-size:12px;color:#d0d8e8">' + d + '</div>';
      } else {
        out += '<div style="padding:5px 2px;border-radius:7px;border:1px solid #f0f4f8;font-size:12px;color:#94a3b8">' + d + '</div>';
      }
    }
    out += '</div></div>';
  });
  out += '</div><div id="day-slots-panel" style="margin-top:16px"></div>';
  return out;
}

    .select('*').eq('slot_date', dateStr).eq('is_open', true).order('slot_time');
  var daySlots = res.data || [];

  if (!daySlots.length) {
    panel.innerHTML = '<div style="color:#94a3b8;font-size:13px;padding:8px">이 날짜에는 수업이 없습니다.</div>';
    return;
  }

  var d = new Date(dateStr+'T12:00:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'long'});
  var h = '<div style="background:#f8faff;border:1.5px solid #e2e8f0;border-radius:12px;padding:16px 20px">'
    + '<div style="font-size:14px;font-weight:800;color:#0b1626;margin-bottom:12px">📅 ' + d + '</div>'
    + '<div style="display:flex;flex-wrap:wrap;gap:8px">';

  daySlots.forEach(function(s){
    var full = s.booked_count >= s.max_students;
    var typeMap = {both:'그룹+개인', solo:'개인', group:'그룹'};
    var tl = typeMap[s.plan_type] || s.plan_type;
    var hasCredit = (s.plan_type==='solo'||s.plan_type==='both') ? soloR>0 : true;
    if (s.plan_type==='group'||s.plan_type==='both') hasCredit = hasCredit || groupR>0;

    if (full) {
      h += '<div style="padding:10px 14px;border-radius:10px;border:1.5px solid #e2e8f0;background:#f8faff;color:#94a3b8;font-size:13px;font-weight:700">'
        + s.slot_time.slice(0,5) + ' <span style="font-size:11px">(' + tl + ')</span> <span style="font-size:10px;color:#cc2200">마감</span></div>';
    } else {
      h += '<button onclick="openBookingModal(' + s.id + ',\'' + s.plan_type + '\',\'' + dateStr + '\',\'' + s.slot_time + '\')"'
        + ' style="padding:10px 14px;border-radius:10px;border:1.5px solid #2255a4;background:#f0f6ff;color:#2255a4;font-size:13px;font-weight:700;cursor:pointer">'
        + s.slot_time.slice(0,5) + ' <span style="font-size:11px;font-weight:400">(' + tl + ')</span></button>';
    }
  });
  h += '</div></div>';
  panel.innerHTML = h;

function buildCurriculumSection(progMap) {
  var h = '<div class="pod-section"><div class="learn-section-title" style="margin-top:0">📈 커리큘럼 진행도</div>'
    + '<div style="display:flex;flex-direction:column;gap:22px">';
  Object.entries(CURRICULUM_LESSONS).forEach(function(entry){
    var level = entry[0], lessons = entry[1];
    var lc = CUR_COLOR[level];
    var done = lessons.filter(function(_,i){ return (progMap[level+'_'+(i+1)]||{}).completed; }).length;
    var pct  = Math.round(done/lessons.length*100);
    h += '<div>'
      + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'
      + '<span style="background:'+lc.bg+';color:'+lc.text+';font-size:11px;font-weight:800;padding:3px 10px;border-radius:99px;text-transform:uppercase">' + CUR_LABEL[level] + '</span>'
      + '<span style="font-size:12px;color:#64748b">' + done + ' / ' + lessons.length + ' 완료</span>'
      + '<div style="flex:1;height:7px;background:#e2e8f0;border-radius:99px;overflow:hidden">'
      + '<div style="width:'+pct+'%;height:100%;background:'+lc.bar+';border-radius:99px;transition:width .6s ease"></div>'
      + '</div>'
      + '<span style="font-size:13px;font-weight:900;color:'+lc.text+';min-width:32px;text-align:right">' + pct + '%</span>'
      + '</div>'
      + '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">';
    lessons.forEach(function(lesson, i){
      var isDone = (progMap[level+'_'+(i+1)]||{}).completed;
      h += '<div style="padding:8px 10px;border-radius:8px;border:1.5px solid '+(isDone?lc.bar:'#e2e8f0')+';background:'+(isDone?lc.bg:'#fff')+';display:flex;align-items:center;gap:6px">'
        + '<span style="font-size:15px;flex-shrink:0">' + (isDone?'✅':'⬜') + '</span>'

        + '</div>';
    });
    h += '</div></div>';
  });
  h += '</div></div>';
  return h;
}

async function submitBooking(slotId, planType, dateStr) {
  var finalType = planType === 'both' ? window._bookType : planType;
  if (!finalType) { alert('수업 유형을 선택하세요.'); return; }
  var sb = getSupa(); if (!sb) return;
  var user = (await sb.auth.getUser()).data.user;
  if (!user) { alert('로그인이 필요합니다.'); return; }

  var btn = document.getElementById('bk-submit-btn');
  if (btn) { btn.textContent='신청 중...'; btn.disabled=true; }
  var memo = (document.getElementById('bk-memo')||{}).value || null;

  var res = await sb.from('bookings').insert({
    user_id: user.id, slot_id: slotId, plan_type: finalType, status: 'pending', memo: memo
  });
  if (res.error) {
    alert('예약 실패: ' + res.error.message);
    if (btn) { btn.textContent='예약 신청'; btn.disabled=false; }
    return;
  }
  closeBookingModal();
  alert('✅ 예약 신청이 완료됐습니다!\n확정 후 알림을 드립니다.');
  renderClassesPanel();
}

function renderStudyChart(container, studyLog) {
  // 최근 14일 데이터
  var days = [];
  for (var i = 13; i >= 0; i--) {
    var d = new Date(); d.setDate(d.getDate() - i);
    var key = d.toISOString().slice(0,10);
    var label = (d.getMonth()+1) + '/' + d.getDate();
    var data = studyLog[key] || { articles: 0, words: 0 };
    days.push({ key: key, label: label, articles: data.articles || 0, words: data.words || 0 });
  }

  var maxArticles = Math.max(3, ...days.map(function(d){ return d.articles; }));
  var maxWords    = Math.max(5, ...days.map(function(d){ return d.words; }));

        var wrdH = maxWords > 0    ? Math.round((d.words    / maxWords)    * 72) : 0;
        var isToday = d.key === new Date().toISOString().slice(0,10);
        return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative" title="'+d.label+': '+d.articles+' articles, '+d.words+' words">'          +'<div style="display:flex;align-items:flex-end;gap:1px;height:72px;">'          +'<div style="width:8px;background:'+(artH>0?'#2255a4':'#e8ecf0')+';height:'+Math.max(artH,2)+'px;border-radius:2px 2px 0 0;transition:height .3s"></div>'          +'<div style="width:8px;background:'+(wrdH>0?'#f57f17':'#e8ecf0')+';height:'+Math.max(wrdH,2)+'px;border-radius:2px 2px 0 0;transition:height .3s"></div>'          +'</div>'          +'<div style="font-size:9px;color:'+(isToday?'#f57f17':'#aaa')+';font-weight:'+(isToday?'800':'400')+';white-space:nowrap">'+(isToday?'Today':d.label.slice(-2))+'</div>'          +'</div>';
      }).join('')    +'</div>';

  container.appendChild(chartDiv);
}

function renderStreakCalendar(container, studyLog) {
  var studyDays = {};
  // studyLog에서 학습한 날 추출
  Object.keys(studyLog || {}).forEach(function(k) {
    var d = studyLog[k];
    if ((d.articles || 0) + (d.words || 0) > 0) studyDays[k] = true;
  });
  // localStorage fallback
  try { var s = localStorage.getItem('kh_study_days'); if(s) Object.assign(studyDays, JSON.parse(s)); } catch(e) {}
  var todayKey = new Date().toISOString().slice(0,10);
  studyDays[todayKey] = true;

  var calDiv = document.createElement('div');
  calDiv.style.cssText = 'background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px 20px;box-shadow:var(--shadow);margin-bottom:16px;';
  calDiv.innerHTML = '<div style="font-size:15px;font-weight:900;color:var(--accent);margin-bottom:12px">📅 Study Streak</div>';

  var wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;gap:3px;overflow-x:auto;padding-bottom:4px;';

  var labelCol = document.createElement('div');
  labelCol.style.cssText = 'display:flex;flex-direction:column;gap:3px;margin-right:3px;flex-shrink:0;';
  ['S','M','T','W','T','F','S'].forEach(function(d){
    var s = document.createElement('div');
    s.textContent = d;
    s.style.cssText = 'width:13px;height:13px;font-size:9px;color:#bbb;text-align:center;line-height:13px;';
    labelCol.appendChild(s);
  });
  wrap.appendChild(labelCol);

  var today = new Date();
  var start = new Date(today); start.setDate(today.getDate() - 69);
  start.setDate(start.getDate() - start.getDay());

  var col = null;
  var d = new Date(start);
  while (d <= today) {
    if (d.getDay() === 0) {
      col = document.createElement('div');
      col.style.cssText = 'display:flex;flex-direction:column;gap:3px;flex-shrink:0;';
      wrap.appendChild(col);
    }
    var key = d.toISOString().slice(0,10);
    var cell = document.createElement('div');
    var bg = studyDays[key] ? '#2255a4' : '#e8ecf0';
    var isToday = key === todayKey;
    cell.style.cssText = 'width:13px;height:13px;border-radius:2px;background:'+bg+';'+(isToday?'outline:2px solid #f57f17;outline-offset:1px;':'');
    cell.title = key + (studyDays[key] ? ' ✓' : '');
    if (col) col.appendChild(cell);
    d.setDate(d.getDate() + 1);
  }
  calDiv.appendChild(wrap);

  var streakCount = 0;
  var check = new Date();
  while (studyDays[check.toISOString().slice(0,10)]) {
    streakCount++;
    check.setDate(check.getDate() - 1);
  }

  var bottom = document.createElement('div');
  bottom.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-top:10px;';
  bottom.innerHTML =
    '<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#aaa;">'    +'Less <span style="display:inline-block;width:11px;height:11px;border-radius:2px;background:#e8ecf0"></span>'    +'<span style="display:inline-block;width:11px;height:11px;border-radius:2px;background:#2255a4"></span> More'    +'</div>'    +'<div style="font-size:13px;font-weight:800;color:#f57f17">🔥 '+streakCount+' day streak</div>';
  calDiv.appendChild(bottom);
  container.appendChild(calDiv);
}

var dailyQuestions = [];
var dailyIdx = 0;
var dailyScore = 0;

function startDailyTest() {
  var area = document.getElementById('goals-area');

  // 오늘 읽은 기사 ID 목록 (localStorage)
  var todayKey = new Date().toISOString().slice(0,10);
  var readLog = {};
  try { readLog = JSON.parse(localStorage.getItem('kh_read_log') || '{}'); } catch(e) {}
  var todayIds = readLog[todayKey] || [];

  // 기사 본문에서 vocab 단어 추출 → 퀴즈 생성
  var allArticles = typeof dbLoad === 'function' ? dbLoad() : [];
  var todayArticles = todayIds.length > 0
    ? allArticles.filter(function(a){ return todayIds.indexOf(String(a.id)) !== -1; })
    : allArticles.slice(0, 3); // 오늘 읽은 기사 없으면 최신 3개

  // 기사 본문에서 VOCAB 단어 매칭
  var questions = [];
  var vocabKeys = Object.keys(VOCAB);
  todayArticles.forEach(function(a) {
    var text = (a.title || '') + ' ' + (a.body || '') + ' ' + (a.full || '');
    vocabKeys.forEach(function(k) {
      if (text.indexOf(k) !== -1 && VOCAB[k]) {
        questions.push({
          ko: k,
          correct: VOCAB[k].en,
          rom: VOCAB[k].rom,
          article: a.title,
        });
      }
    });
  });

  // 중복 제거 + 셔플 + 최대 10문제
  var seen = {};
  questions = questions.filter(function(q) {
    if (seen[q.ko]) return false;
    seen[q.ko] = true;
    return true;
  });
  questions.sort(function(){ return Math.random() - 0.5; });
  questions = questions.slice(0, 10);

  if (questions.length < 3) {
    // 단어 부족하면 VOCAB에서 랜덤으로 채움
    var extra = vocabKeys.filter(function(k){ return !seen[k]; })
      .sort(function(){ return Math.random() - 0.5; })
      .slice(0, 10 - questions.length);
    extra.forEach(function(k) {
      questions.push({ ko: k, correct: VOCAB[k].en, rom: VOCAB[k].rom, article: null });
    });
  }

  // 각 문제에 보기 4개 생성
  questions = questions.map(function(q) {
    var wrongs = vocabKeys
      .filter(function(k){ return k !== q.ko; })
      .sort(function(){ return Math.random() - 0.5; })
      .slice(0, 3)
      .map(function(k){ return VOCAB[k].en; });
    var opts = [q.correct].concat(wrongs).sort(function(){ return Math.random() - 0.5; });
    return Object.assign({}, q, { opts: opts });
  });

  dailyQuestions = questions;
  dailyIdx = 0;
  dailyScore = 0;
  showDailyQuestion(area);
}

function showDailyQuestion(area) {
  if (dailyIdx >= dailyQuestions.length) {
    showDailyResult(area);
    return;
  }
  var q = dailyQuestions[dailyIdx];
  var progress = Math.round((dailyIdx / dailyQuestions.length) * 100);

  area.innerHTML =
    // 헤더
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">'
    +'<div style="font-size:15px;font-weight:900;color:var(--accent)">📝 Daily Review Test</div>'
    +'<div style="font-size:13px;color:var(--gray)">'+( dailyIdx+1)+' / '+dailyQuestions.length+'</div>'
    +'</div>'
    // 진행바
    +'<div style="height:6px;background:#e8ecf0;border-radius:999px;margin-bottom:24px;overflow:hidden">'
    +'<div style="height:100%;width:'+progress+'%;background:linear-gradient(90deg,#2255a4,#3d7fd4);border-radius:999px;transition:width .3s"></div>'
    +'</div>'
    // 출처 기사
    +(q.article ? '<div style="font-size:11px;color:#aaa;margin-bottom:8px;background:#f8faff;padding:6px 12px;border-radius:6px;border-left:3px solid #2255a4">📰 '+q.article+'</div>' : '')
    // 문제
    +'<div style="font-size:13px;color:var(--gray);margin-bottom:8px;font-weight:600">What does this mean in English?</div>'
    +'<div style="font-size:40px;font-weight:900;color:var(--dark);text-align:center;margin:20px 0;font-family:\'Noto Serif KR\',serif">'+q.ko+'</div>'
    +'<div style="font-size:13px;color:#aaa;text-align:center;margin-bottom:24px;font-style:italic">'+q.rom+'</div>'
    // 보기
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px" id="daily-opts">'
    + q.opts.map(function(opt, i) {
        return '<button onclick="checkDailyAnswer(this,\''+opt.replace(/'/g,"\\'")+'\')" '
          +'style="padding:14px;background:#fff;border:2px solid var(--border);border-radius:10px;'
          +'font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;'
          +'font-family:inherit;color:var(--dark)" '
          +'onmouseover="this.style.borderColor=\'#2255a4\'" onmouseout="if(!this.dataset.answered)this.style.borderColor=\'var(--border)\'">'
          +opt+'</button>';
      }).join('')
    +'</div>';
}

function checkDailyAnswer(btn, selected) {
  var q = dailyQuestions[dailyIdx];
  var correct = q.correct;
  var opts = document.querySelectorAll('#daily-opts button');
  opts.forEach(function(b) {
    b.dataset.answered = '1';
    b.style.cursor = 'default';
    b.onclick = null;
    b.onmouseover = null;
    b.onmouseout = null;
    var isCorrect = b.textContent.trim() === correct;
    var isSelected = b === btn;
    if (isCorrect) {
      b.style.background = '#e8f5e9';
      b.style.borderColor = '#28a745';
      b.style.color = '#2e7d32';
    } else if (isSelected) {
      b.style.background = '#fce4ec';
      b.style.borderColor = '#dc3545';
      b.style.color = '#c62828';
    }
  });

  if (selected === correct) dailyScore++;

  setTimeout(function() {
    dailyIdx++;
    var area = document.getElementById('goals-area');
    showDailyQuestion(area);
  }, 900);
}

function showDailyResult(area) {
  var total = dailyQuestions.length;
  var pct = Math.round(dailyScore / total * 100);
  trackActivityOnQuizComplete(pct); // 뱃지 + XP
  var emoji = pct >= 80 ? '🎉' : pct >= 60 ? '👍' : '💪';
  var msg   = pct >= 80 ? 'Great job!' : pct >= 60 ? 'Good effort!' : 'Keep studying!';
  var color = pct >= 80 ? '#28a745' : pct >= 60 ? '#f57f17' : '#dc3545';

  area.innerHTML =
    '<div style="text-align:center;padding:32px 16px">'
    +'<div style="font-size:56px;margin-bottom:12px">'+emoji+'</div>'
    +'<div style="font-size:22px;font-weight:900;color:var(--accent);margin-bottom:6px">Test Complete!</div>'
    +'<div style="font-size:14px;color:var(--gray);margin-bottom:20px">'+msg+'</div>'
    +'<div style="font-size:48px;font-weight:900;color:'+color+';margin-bottom:4px">'+dailyScore+' / '+total+'</div>'
    +'<div style="font-size:13px;color:var(--gray);margin-bottom:8px">'+pct+'% correct</div>'
    // 점수 바
    +'<div style="height:8px;background:#e8ecf0;border-radius:999px;margin:16px auto;max-width:260px;overflow:hidden">'
    +'<div style="height:100%;width:'+pct+'%;background:'+color+';border-radius:999px;transition:width .6s"></div>'
    +'</div>'
    // 문제별 결과
    +'<div style="text-align:left;margin:20px 0;max-width:400px;margin-left:auto;margin-right:auto">'
    + dailyQuestions.map(function(q, i) {
        var userAnswered = i < dailyScore; // 간단 표시
        return '';
      }).join('')
    +'</div>'
    +'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'
    +'<button onclick="startDailyTest()" class="quiz-next2" style="background:#f0f4ff;color:var(--accent)">🔄 Retry</button>'
    +'<button onclick="renderGoals()" class="quiz-next2">← Back to Goals</button>'
    +'</div>'
    +'</div>';
}

function startLevelTest() {
  // 각 Level에서 5개씩 랜덤 선택
  function pick(arr, n) {
    return arr.slice().sort(function(){ return Math.random()-0.5; }).slice(0,n);
  }
  var bWords = pick(LEVEL_WORDS.beginner, 5).map(function(w){ return {ko:w,level:'beginner'}; });
  var iWords = pick(LEVEL_WORDS.intermediate, 5).map(function(w){ return {ko:w,level:'intermediate'}; });
  var aWords = pick(LEVEL_WORDS.advanced, 5).map(function(w){ return {ko:w,level:'advanced'}; });
  lvTestWords = bWords.concat(iWords).concat(aWords).sort(function(){ return Math.random()-0.5; });
  lvIdx = 0;
  lvScores = { beginner:0, intermediate:0, advanced:0 };
  showLevelQuestion();
}

function showLevelQuestion() {
  var area = document.getElementById('level-area');
  if(lvIdx >= lvTestWords.length) {
    finishLevelTest();
    return;
  }
  var w   = lvTestWords[lvIdx];
  var vo  = (typeof VOCAB !== 'undefined' && VOCAB[w.ko]) || null;
  if(!vo){ lvIdx++; showLevelQuestion(); return; }
  lvAnswer = vo.en;

  // Wrong options from other level words
  var allKeys = Object.values(LEVEL_WORDS).reduce(function(a,b){ return a.concat(b); },[]);
  var others  = allKeys.filter(function(k){ return k !== w.ko && VOCAB[k]; })
    .sort(function(){ return Math.random()-0.5; }).slice(0,3)
    .map(function(k){ return VOCAB[k].en; });
  var opts = [vo.en].concat(others).sort(function(){ return Math.random()-0.5; });

  area.innerHTML =
    '<div class="lv-q-wrap">'
    +'<div class="lv-progress">'+( lvIdx+1)+' / '+lvTestWords.length+'</div>'
    +'<div class="lv-word">'+w.ko+'</div>'
    +'<div class="lv-rom">'+vo.rom+'</div>'
    +'<div class="lv-opts">'
    +opts.map(function(o){
        return '<button class="lv-opt" data-en="'+o+'" onclick="checkLevel(this.dataset.en,this)">'+o+'</button>';
      }).join('')
    +'</div>'
    +'<button class="quiz-next2" id="lv-next-btn" style="display:none;margin-top:16px" onclick="nextLevel()">Next →</button>'
    +'</div>';
}

function checkLevel(chosen, btn) {
  document.querySelectorAll('.lv-opt').forEach(function(b){ b.disabled=true; });
  var w = lvTestWords[lvIdx];
  if(chosen === lvAnswer) {
    btn.classList.add('correct');
    lvScores[w.level]++;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.lv-opt').forEach(function(b){
      if(b.textContent === lvAnswer) b.classList.add('correct');
    });
  }
  document.getElementById('lv-next-btn').style.display = 'block';
}

function nextLevel() { lvIdx++; showLevelQuestion(); }

async function finishLevelTest() {
  // Determine level: highest score wins; tie → lower level
  var b = lvScores.beginner, im = lvScores.intermediate, ad = lvScores.advanced;
  var level;
  if(ad >= im && ad >= b && ad >= 3)       level = 'advanced';
  else if(im >= b && im >= 2)              level = 'intermediate';
  else                                     level = 'beginner';

  await dbSaveLevel(level);

  var m   = LEVEL_META[level];
  var area = document.getElementById('level-area');
  area.innerHTML =
    '<div class="lv-result">'
    +'<div class="lv-result-badge">🎉</div>'
    +'<div style="font-size:13px;color:var(--gray);margin-bottom:12px">Test Complete!</div>'
    +'<div style="margin-bottom:4px;font-size:13px;color:var(--gray)">Beginner '+b+'/5 · Intermediate '+im+'/5 · Advanced '+ad+'/5</div>'
    +'<div class="level-badge '+m.color+'" style="margin:12px auto;display:inline-flex">'+m.label+'</div>'
    +'<div class="lv-result-desc">'+m.desc+'</div>'
    +'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px">'
    +'<button class="quiz-next2" onclick="startLevelTest()">🔄 Retake Test</button>'
    +'<a href="korehan-learn.html" class="quiz-next2" style="text-decoration:none;background:linear-gradient(135deg,#0b1626,#1a3a6b)">✏️ Study Vocabulary →</a>'
    +'<a href="index.html" class="quiz-next2" style="text-decoration:none;background:#28a745">📰 Read Articles →</a>'
    +'</div>'
    +'</div>';

  // Update stats card
  var statsEl = document.getElementById('mp-stats');
  if(statsEl){
    var badge = statsEl.querySelector('.level-stat-badge');
    if(!badge){
      statsEl.innerHTML += '<div class="stat-card"><div class="stat-num" style="font-size:14px;margin-top:4px">'+m.label+'</div><div class="stat-label">내 Level</div></div>';
    }
  }
}

  area.innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray)">'
    + '<div style="font-size:28px;margin-bottom:10px;display:inline-block;animation:lq-pulse 1s infinite">✨</div>'
    + '<div style="font-size:14px;font-weight:700;margin-top:8px">AI가 문제를 만들고 있어요...</div></div>';

  if (!supaUser) {
    area.innerHTML = '<div style="padding:32px;text-align:center;color:var(--gray)"><div style="font-size:36px;margin-bottom:10px">🔒</div><div style="font-weight:800;margin-bottom:6px">Sign in required</div></div>';
    return;
  }

  // ── 문장 소스 준비 ──────────────────────────────────────────
  // 1) 저장 단어로 만든 짧은 문장 힌트
  var wordList = (savedWords && savedWords.length >= 3)
    ? savedWords.slice(0, 10).map(function(w){ return w.ko + '(' + (w.en||'') + ')'; }).join(', ')
    : '경제(economy), 대통령(president), 문화(culture), 사회(society), 수출(export)';

  // 2) 읽은 기사 문장 (최근 3개 기사 첫 문장)
  var articleSnippets = '';
  var arts = getCachedArticles ? getCachedArticles().filter(function(a){ return a.status === 'published'; }).slice(0,3) : [];
  if (arts.length) {
    articleSnippets = '\n\nAlso use these real sentences from Korean news articles:\n'
      + arts.map(function(a){ return '- ' + a.body.split('.')[0] + '.'; }).join('\n');
  }

  // ── 타입별 프롬프트 ─────────────────────────────────────────
  var typeInstruction;
  if (_lqType === 'hear') {
    typeInstruction = 'Mode: WHAT DID YOU HEAR?\nFor each question: give a correct Korean sentence and 2 wrong Korean sentences that sound similar (similar-sounding words or grammar). User listens and picks correct Korean text.';
  } else if (_lqType === 'mean') {
    typeInstruction = 'Mode: WHAT DOES IT MEAN?\nFor each question: give a Korean sentence and 3 English meaning options (1 correct, 2 plausible but wrong). User hears Korean and picks correct English meaning.';
  } else {
    typeInstruction = 'Mode: PICK THE TRANSLATION\nFor each question: give a Korean sentence in the "sentence" field. The "correct" field should be the English translation. The "wrong1" and "wrong2" should be plausible wrong English translations.';
  }

  var prompt = 'You are a Korean listening comprehension quiz maker.\n\nVocabulary to include: ' + wordList + articleSnippets + '\n\n' + typeInstruction + '\n\nReturn ONLY valid JSON, no markdown:\n{"questions":[{"sentence":"Korean sentence","correct":"correct answer","wrong1":"wrong option 1","wrong2":"wrong option 2","explanation":"2 sentences: what this means + 1 grammar point"}]}\n\nGenerate exactly 5 varied questions mixing vocabulary words and article sentences.';

  try {
    var data = await callClaude({
      feature: 'quiz',
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1200,
      messages: [{ role: 'user', content: prompt }]
    });
    var raw  = (data.content || []).map(function(c){ return c.text||''; }).join('');
    var parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());

    _lqQs = parsed.questions.map(function(q) {
      var choices = [q.correct, q.wrong1, q.wrong2].sort(function(){ return Math.random()-.5; });
      return { sentence: q.sentence, correct: q.correct, choices: choices, explanation: q.explanation };
    });
    _lqIdx = 0; _lqScore = 0; _lqDone = false;
    renderLQQ();
  } catch(e) {
    area.innerHTML = '<div style="padding:28px;text-align:center">'
      + '<div style="font-size:32px;margin-bottom:10px">⚠️</div>'
      + '<div style="font-weight:700;color:#dc2626;margin-bottom:14px">Generation failed — try again</div>'
      + '<button onclick="startListeningQuizMP()" style="padding:10px 24px;background:#2255a4;color:#fff;border:none;border-radius:99px;font-size:13px;font-weight:700;cursor:pointer">🔄 Retry</button>'
      + '</div>';
  }
}

function renderLQQ() {
  var q     = _lqQs[_lqIdx];
  var total = _lqQs.length;
  var pct   = Math.round((_lqIdx / total) * 100);
  var area  = document.getElementById('quiz-area');

  var questionText = _lqType === 'hear' ? 'What did you hear?'
    : _lqType === 'mean' ? 'What does this mean in English?'
    : 'Which is the correct translation?';

  area.innerHTML =
    '<div class="lq-wrap">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    + '<span style="font-size:12px;font-weight:700;color:var(--gray)">' + (_lqIdx+1) + ' / ' + total + '</span>'
    + '<span style="font-size:12px;font-weight:800;color:#2255a4">⭐ ' + _lqScore + ' correct</span>'
    + '</div>'
    + '<div class="lq-progress-bar"><div class="lq-progress-fill" style="width:' + pct + '%"></div></div>'

    // 스피커
    + '<div style="text-align:center;margin-bottom:20px">'
    + '<button class="lq-speaker-btn" id="lq-sp-btn" onclick="lqSpeakQ()">'
    + '<span style="font-size:38px">🔊</span>'
    + '</button>'
    + '<div style="font-size:11px;color:var(--gray);margin-top:6px">Tap to listen again</div>'
    + '</div>'

    // translation 모드면 한국어 문장도 표시
    + (_lqType === 'trans' ? '<div style="font-size:18px;font-weight:900;color:#0b1626;text-align:center;font-family:\'Noto Sans KR\',sans-serif;margin-bottom:16px;padding:14px;background:#f8faff;border-radius:12px">' + q.sentence + '</div>' : '')

    + '<div class="lq-question">' + questionText + '</div>'
    + '<div class="lq-choices">'
    + q.choices.map(function(c) {
        var safe = c.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
        return '<button class="lq-choice" data-val="' + safe + '" onclick="lqPickAnswer(this)">' + c + '</button>';
      }).join('')
    + '</div>'
    + '<div id="lq-fb"></div>'
    + '</div>';

  setTimeout(lqSpeakQ, 350);
}

function lqSpeakQ() {
  var q   = _lqQs[_lqIdx];
  var btn = document.getElementById('lq-sp-btn');
  if (btn) btn.classList.add('playing');
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(q.sentence);
  u.lang = 'ko-KR'; u.rate = 0.82;
  u.onend = function(){ if(btn) btn.classList.remove('playing'); };
  window.speechSynthesis.speak(u);
}

function lqPickAnswer(btn) {
  if (document.querySelector('.lq-choice:disabled')) return; // 이미 답했음
  var q       = _lqQs[_lqIdx];
  var chosen  = btn.dataset.val;
  var correct = chosen === q.correct;
  if (correct) _lqScore++;

  document.querySelectorAll('.lq-choice').forEach(function(b) {
    b.disabled = true;
    if (b.dataset.val === q.correct) b.classList.add('correct');
  });
  if (!correct) btn.classList.add('wrong');

  var fb = document.getElementById('lq-fb');
  fb.innerHTML =
    '<div class="lq-explanation">'
    + '<div class="lq-exp-title">💡 ' + (correct ? '정답이에요! 🎉' : '아쉬워요') + '</div>'
    + '<div class="lq-exp-body">' + q.explanation + '</div>'
    + '</div>'
    + '<button class="lq-next-btn" onclick="lqNextQ()">'
    + (_lqIdx < _lqQs.length - 1 ? 'Next →' : 'See Results 🏁')
    + '</button>';
}

function lqNextQ() {
  _lqIdx++;
  if (_lqIdx >= _lqQs.length) { lqResultMP(); }
  else { renderLQQ(); }
}

function lqResultMP() {
  var total = _lqQs.length;
  var pct   = Math.round((_lqScore / total) * 100);
  var emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '💪';
  var msg   = pct >= 80 ? 'Excellent listening!' : pct >= 60 ? 'Good job!' : 'Keep practicing!';

  document.getElementById('quiz-area').innerHTML =
    '<div class="lq-wrap" style="text-align:center;padding:32px 20px">'
    + '<div class="lq-score-ring"><div style="font-size:28px">' + emoji + '</div><div style="font-size:22px;font-weight:900">' + pct + '%</div></div>'
    + '<div style="font-size:19px;font-weight:900;color:#0b1626;margin-bottom:6px">' + msg + '</div>'
    + '<div style="font-size:14px;color:var(--gray);margin-bottom:28px">' + _lqScore + ' / ' + total + ' correct</div>'
    + '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'
    + '<button onclick="startListeningQuizMP()" style="padding:12px 22px;background:#2255a4;color:#fff;border:none;border-radius:99px;font-size:13px;font-weight:900;cursor:pointer">🔄 New Quiz</button>'
    + '<button onclick="setQuizMode(\'flash\',document.getElementById(\'qmode-flash\'))" style="padding:12px 22px;background:#fff;color:var(--accent);border:2px solid var(--border);border-radius:99px;font-size:13px;font-weight:700;cursor:pointer">📝 Flashcard Quiz</button>'
    + '</div>'
    + '</div>';

  if (typeof dmTrackQuiz === 'function') dmTrackQuiz();
}

function renderQuiz(words) {
  var area = document.getElementById('quiz-area');
  if(!words || words.length < 4) {
    area.innerHTML = '<div class="empty-state"><div class="es-icon">🔖</div>'
      + '<p>퀴즈를 시작하려면 단어 4개 이상 저장이 필요해요.<br>'
      + '<a href="korehan-learn.html" style="color:var(--bright);font-weight:700">학습 페이지에서 저장하기 →</a></p></div>';
    return;
  }
  quizWords = words.slice().sort(function(){ return Math.random()-0.5; });
  quizIdx = 0; quizScore = 0; quizTotal = 0;
  showQuizQuestion();
}

function showQuizQuestion() {
  var area = document.getElementById('quiz-area');
  if(quizIdx >= quizWords.length) {
    area.innerHTML = '<div class="quiz-wrap2" style="text-align:center">'
      + '<div style="font-size:48px;margin-bottom:12px">🎉</div>'
      + '<div style="font-size:22px;font-weight:900;color:var(--accent);margin-bottom:8px">Quiz Complete!</div>'
      + '<div style="font-size:18px;color:var(--dark);margin-bottom:20px">' + quizScore + ' / ' + quizTotal + ' Correct</div>'
      + '<button class="quiz-next2" onclick="renderQuiz(savedWords)">Retake Quiz 🔄</button>'
      + '</div>';
    dbSaveQuizResult(quizScore, quizTotal);
  renderGoals(); // refresh goal progress
    return;
  }
  var w = quizWords[quizIdx];
  currentAnswer = w.en;
  // Generate wrong options from other saved words
  var others = quizWords.filter(function(x){ return x.ko !== w.ko; })
    .sort(function(){ return Math.random()-0.5; }).slice(0,3).map(function(x){ return x.en; });
  var opts = [w.en].concat(others).sort(function(){ return Math.random()-0.5; });

  area.innerHTML = '<div class="quiz-wrap2">'
    + '<div class="quiz-score2">Score: ' + quizScore + ' / ' + quizTotal + ' &nbsp;|&nbsp; ' + (quizIdx+1) + ' / ' + quizWords.length + '</div>'
    + '<div class="quiz-q2">' + w.ko + '</div>'
    + '<div class="quiz-rom2">' + (w.rom||'') + '</div>'
    + '<div class="quiz-opts2">'
    + opts.map(function(o){
        return '<button class="quiz-opt2" onclick="checkQuiz(\'' + o.replace(/'/g,"\\'") + '\',this)">' + o + '</button>';
      }).join('')
    + '</div>'
    + '<button class="quiz-next2" id="quiz-next2-btn" style="display:none" onclick="nextQuiz2()">Next →</button>'
    + '</div>';
}

function checkQuiz(chosen, btn) {
  quizTotal++;
  document.querySelectorAll('.quiz-opt2').forEach(function(b){ b.disabled = true; });
  if(chosen === currentAnswer) { btn.classList.add('correct'); quizScore++; }
  else { btn.classList.add('wrong'); document.querySelectorAll('.quiz-opt2').forEach(function(b){ if(b.textContent===currentAnswer) b.classList.add('correct'); }); }
  document.getElementById('quiz-next2-btn').style.display = 'block';
}

function nextQuiz2() { quizIdx++; showQuizQuestion(); }

// ── Saved Words 목록 ───────────────────────────────────────────
function renderWordsList(words) {
  var area = document.getElementById('words-list-area');
  if(!words || !words.length) {
    area.innerHTML = '<div class="empty-state"><div class="es-icon">🔖</div><p>No saved words yet.</p></div>';
    return;
  }
  area.innerHTML = '<div style="margin-bottom:12px;font-size:13px;color:var(--gray)">'
    + words.length + ' saved</div>'
    + words.map(function(w){
        return '<div class="saved-word-row" onclick="openWordModal(\'' + w.ko.replace(/'/g,"\\'") + '\',\'' + (w.rom||'').replace(/'/g,"\\'") + '\',\'' + (w.en||'').replace(/'/g,"\\'") + '\')" style="cursor:pointer;transition:background .15s" onmouseenter="this.style.background=\'#f8faff\'" onmouseleave="this.style.background=\'\'" title="Click for examples">'
          + '<div>'
          + '<span class="sw-ko">' + w.ko + '</span>'
          + '<span class="sw-rom"> ' + (w.rom||'') + '</span>'
          + '</div>'
          + '<div style="display:flex;align-items:center;gap:12px">'
          + '<span class="sw-en">' + (w.en||'') + '</span>'
          + '<span style="font-size:11px;color:#c0cfe0;font-weight:600">examples →</span>'
          + '<button class="sw-del" onclick="event.stopPropagation();removeWord(\'' + w.ko.replace(/'/g,"\\'") + '\',this)" title="Remove">✕</button>'
          + '</div>'
          + '</div>';
      }).join('');
}


// ── Word Detail Modal ──────────────────────────────────────────────
var _wmCurrentWord = null;

function openWordModal(ko, rom, en) {
  _wmCurrentWord = { ko: ko, rom: rom, en: en };

  // 내용 채우기
  document.getElementById('wm-ko').textContent  = ko;
  document.getElementById('wm-rom').textContent = rom ? '[' + rom + ']' : '';
  document.getElementById('wm-en').textContent  = en;

  // 로딩 상태
  document.getElementById('wm-examples').innerHTML =
    '<div style="text-align:center;padding:32px 0;color:#94a3b8">'
    + '<div style="font-size:28px;margin-bottom:10px;animation:wm-spin 1s linear infinite;display:inline-block">✨</div>'
    + '<div style="font-size:13px;font-weight:600">Generating examples with AI...</div>'
    + '</div>';

  // 모달 열기
  var overlay = document.getElementById('word-modal-overlay');
  var modal   = document.getElementById('word-modal');
  overlay.style.display = 'block';
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      modal.classList.add('open');
    });
  });
  document.body.style.overflow = 'hidden';

  // AI 예문 생성
  generateWordExamples(ko, rom, en);
}

function closeWordModal(e) {
  if (e && e.target !== document.getElementById('word-modal-overlay')) return;
  var overlay = document.getElementById('word-modal-overlay');
  var modal   = document.getElementById('word-modal');
  modal.classList.remove('open');
  setTimeout(function(){
    overlay.style.display = 'none';
    document.body.style.overflow = '';
  }, 350);
}

function wordModalTTS() {
  if (!_wmCurrentWord) return;
  var utter = new SpeechSynthesisUtterance(_wmCurrentWord.ko);
  utter.lang = 'ko-KR'; utter.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utter);
}

function speakSentence(text) {
  var utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ko-KR'; utter.rate = 0.8;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utter);
}

async function generateWordExamples(ko, rom, en) {
  var prompt = 'You are a Korean language teacher. Generate 3 natural Korean example sentences using the word ' + ko + ' meaning ' + en + '. Mix 1 beginner, 1 intermediate, 1 advanced. Be natural and practical. Include English translation. Return ONLY JSON: {"examples":[{"ko":"Korean sentence","en":"translation","level":"Beginner"},{"ko":"...","en":"...","level":"Intermediate"},{"ko":"...","en":"...","level":"Advanced"}]}';

  try {
    var data = await callClaude({
      feature: 'grammar',
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 600,
      messages: [{ role: 'user', content: prompt }]
    });
    var raw  = (data.content || []).map(function(c){ return c.text || ''; }).join('');
    var clean = raw.replace(/```json|```/g,'').trim();
    var parsed = JSON.parse(clean);
    renderWordExamples(parsed.examples);
  } catch(e) {
    showFallbackExamples(ko, en);
  }
}

function renderWordExamples(examples) {
  var levelColors = {
    Beginner:     { bg:'#f0fdf4', border:'#86efac', badge:'#16a34a' },
    Intermediate: { bg:'#fffbeb', border:'#fcd34d', badge:'#d97706' },
    Advanced:     { bg:'#fef2f2', border:'#fca5a5', badge:'#dc2626' },
  };

  var html = examples.map(function(ex) {
    var c = levelColors[ex.level] || levelColors.Intermediate;
    return '<div onclick="speakSentence(\'' + ex.ko.replace(/'/g,"\'").replace(/"/g,'&quot;') + '\')" '
      + 'style="background:' + c.bg + ';border:1.5px solid ' + c.border + ';border-radius:14px;padding:14px 16px;margin-bottom:12px;cursor:pointer;transition:transform .15s,box-shadow .15s" '
      + 'onmouseenter="this.style.transform=\'translateY(-1px)\';this.style.boxShadow=\'0 4px 12px rgba(0,0,0,.08)\'" '
      + 'onmouseleave="this.style.transform=\'\';this.style.boxShadow=\'\'">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
      + '<span style="font-size:10px;font-weight:800;color:' + c.badge + ';text-transform:uppercase;letter-spacing:.8px">' + ex.level + '</span>'
      + '<span style="font-size:16px">🔊</span>'
      + '</div>'
      + '<div style="font-size:16px;font-weight:700;color:#0b1626;line-height:1.5;margin-bottom:4px">' + ex.ko + '</div>'
      + '<div style="font-size:13px;color:#64748b;line-height:1.4">' + ex.en + '</div>'
      + '</div>';
  }).join('');

  document.getElementById('wm-examples').innerHTML = html;
}

function showFallbackExamples(ko, en) {
  document.getElementById('wm-examples').innerHTML =
    '<div style="padding:20px;text-align:center;color:#94a3b8">'
    + '<div style="font-size:24px;margin-bottom:10px">📚</div>'
    + '<div style="font-size:13px;font-weight:600;margin-bottom:6px">No API key configured</div>'
    + '<div style="font-size:12px">Set up your Anthropic API key in Admin → Settings to enable AI examples.</div>'
    + '</div>';
}

async function removeWord(ko, btn) {
  await dbRemoveWord(ko);
  savedWords = savedWords.filter(function(w){ return w.ko !== ko; });
  btn.closest('.saved-word-row').remove();
  // Update stats
  document.querySelector('#mp-stats .stat-card:nth-child(3) .stat-num').textContent = savedWords.length;
}

// ── Articles Read 목록 ─────────────────────────────────────────────
function renderArticlesList(articles) {
  var area = document.getElementById('articles-list-area');
  if(!articles || !articles.length) {
    area.innerHTML = '<div class="empty-state"><div class="es-icon">📰</div><p>아직 Articles Read가 없어요.<br><a href="index.html" style="color:var(--bright);font-weight:700">Start reading →</a></p></div>';
    return;
  }
  area.innerHTML = '<div style="margin-bottom:12px;font-size:13px;color:var(--gray)">' + articles.length + '개 읽음</div>'
    + articles.map(function(a){
        var d = new Date(a.read_at);
        var dateStr = d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
        return '<div class="read-row">'
          + '<span class="read-tag">' + (a.section||'') + '</span>'
          + '<div>'
          + '<a class="read-title" href="korehan-article.html?id=' + a.article_id + '">' + a.title + '</a>'
          + '<div class="read-date">' + dateStr + '</div>'
          + '</div>'
          + '</div>';
      }).join('');
}

document.addEventListener('DOMContentLoaded', function(){
  // Supabase 세션 로드 대기 후 initMyPage 실행
  var attempts = 0;
  function waitForSession() {
    attempts++;
    if (supaUser) {
      initMyPage();
    } else if (attempts < 30) {
      setTimeout(waitForSession, 200);
    } else {
      // 세션 없음 = 비로그인
      initMyPage();
    }
  }
  setTimeout(waitForSession, 300);
});
</script>
