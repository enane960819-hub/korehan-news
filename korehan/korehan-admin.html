<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KoreHan Admin CMS</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@400;600;700;900&family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--a:#1a3a6b;--b:#2255a4;--li:#e8eef7;--r:#cc2200;--g:#1a7a3a;--dk:#0d1b2e;--gr:#445566;--br:#d4dce8;--w:#fff;--bg:#f4f6fa}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--dk);font-size:14px}
a{color:inherit;text-decoration:none}

/* TOP BAR */
.topbar{background:var(--dk);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:12px;position:sticky;top:0;z-index:100}
.tb-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:#5a8fd0}
.tb-logo b{color:#fff}
.badge{background:var(--r);color:#fff;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:2px;margin-left:8px}
.tb-right{display:flex;gap:12px;align-items:center;font-size:13px}
.tb-right a{color:#7a9ac0;text-decoration:none}
.tb-right a:hover{color:#fff}
.vsb{background:var(--b);color:#fff!important;padding:6px 14px;font-size:12px;font-weight:700;border-radius:3px}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 52px)}

/* SIDEBAR */
.sb{width:230px;flex-shrink:0;background:var(--w);border-right:1px solid var(--br);overflow-y:auto}
.sb-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#99aabb;padding:16px 20px 4px}
.sb-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 20px;font-size:13px;font-weight:600;color:var(--gr);cursor:pointer;border:none;background:none;text-align:left;border-left:3px solid transparent;font-family:inherit;transition:all .15s}
.sb-btn:hover{background:var(--li);color:var(--a)}
.sb-btn.on{background:var(--li);color:var(--a);border-left-color:var(--a)}
.sb-btn .ico{width:20px;text-align:center;font-size:15px}
.pill{margin-left:auto;background:#e4e8f0;color:var(--gr);font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;min-width:20px;text-align:center}

/* MAIN */
.main{flex:1;padding:28px 32px;overflow:auto;max-width:100%}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;font-size:13px;font-weight:700;border:none;cursor:pointer;border-radius:3px;font-family:inherit;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-b{background:var(--a);color:#fff}
.btn-g{background:var(--g);color:#fff}
.btn-r{background:var(--r);color:#fff}
.btn-gh{background:transparent;color:var(--a);border:1.5px solid var(--a)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:2px}

/* PAGE HEADER */
.pg-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px}
.pg-hd h1{font-family:'Playfair Display',serif;font-size:26px}
.pg-hd p{font-size:13px;color:var(--gr);margin-top:3px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.stat{background:var(--w);border:1px solid var(--br);padding:16px 18px}
.stat-n{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--a);line-height:1;margin-bottom:4px}
.stat-l{font-size:11px;color:var(--gr);text-transform:uppercase;letter-spacing:.8px}

/* INFO BOX */
.infobox{background:var(--w);border:1px solid var(--br);border-left:4px solid var(--b);padding:14px 18px;margin-bottom:16px;font-size:13px;color:var(--gr);line-height:1.7}
.infobox h3{font-size:14px;font-weight:700;color:var(--a);margin-bottom:5px}

/* TOOLBAR */
.toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.srch{flex:1;min-width:180px;display:flex;align-items:center;background:var(--w);border:1.5px solid var(--br);border-radius:3px;padding:0 12px;gap:8px}
.srch input{flex:1;border:none;outline:none;font-size:13px;padding:8px 0;font-family:inherit;background:transparent}
.flt{padding:8px 12px;font-size:13px;border:1.5px solid var(--br);border-radius:3px;background:var(--w);font-family:inherit;color:var(--dk);outline:none;cursor:pointer}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;background:var(--w)}
.tbl th{text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--gr);border-bottom:2px solid var(--br);background:var(--li)}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--br);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#f8fafd}
.thumb{width:70px;height:48px;object-fit:cover;border-radius:2px;display:block}
.art-t{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;line-height:1.3}
.art-b{font-size:12px;color:var(--gr);margin-top:3px;max-width:340px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.cpill{display:inline-block;padding:2px 8px;font-size:11px;font-weight:700;border-radius:2px}
.c사회{background:#e8eef7;color:#1a3a6b}
.c국제{background:#f0e8f7;color:#5a1a7a}
.c문화{background:#f7e8ee;color:#7a1a3a}
.c스포츠{background:#e8f4f7;color:#1a5a7a}
.cKorea{background:#fff0ec;color:#cc2200}
.cIT과학{background:#eef7e8;color:#3a7a1a}
.c오피니언{background:#fffbe8;color:#7a6400}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px}
.dpub{background:var(--g)}
.ddr{background:#aab}
.row-act{display:flex;gap:6px}

/* EMPTY */
.empty{text-align:center;padding:56px;color:var(--gr)}
.empty .big{font-size:48px;margin-bottom:14px}

/* MODAL OVERLAY */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:200}
.mbox{background:var(--w);border-radius:6px;width:640px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.3)}
.m-hd{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--br)}
.m-hd h2{font-family:'Playfair Display',serif;font-size:20px}
.m-x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gr);line-height:1}
.m-bd{padding:22px}
.m-ft{display:flex;gap:10px;justify-content:flex-end;padding:14px 22px;border-top:1px solid var(--br)}

/* FORM */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fg label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gr)}
.fg input,.fg select,.fg textarea{border:1.5px solid var(--br);border-radius:3px;padding:9px 12px;font-size:14px;font-family:inherit;color:var(--dk);background:var(--w);outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--b)}
.fg textarea{resize:vertical;min-height:120px;line-height:1.6}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cntlabel{font-size:11px;color:#99aabb;text-align:right;margin-top:3px}
.imgprev{max-width:100%;border-radius:4px;margin-top:8px;max-height:180px;object-fit:cover}

/* DELETE CONFIRM */
.del-ov{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:300}
.del-box{background:var(--w);border-radius:8px;padding:32px 28px;text-align:center;width:360px;box-shadow:0 24px 64px rgba(0,0,0,0.3)}
.del-box .dico{font-size:44px;margin-bottom:12px}
.del-box h3{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:8px}
.del-box p{font-size:13px;color:var(--gr);margin-bottom:20px;max-width:280px;margin-left:auto;margin-right:auto}
.del-btns{display:flex;gap:10px;justify-content:center}

/* SETTINGS FORM */
.sf-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.sf-row.full{grid-template-columns:1fr}
.sf-card{background:var(--w);border:1px solid var(--br);border-radius:8px;padding:20px;margin-bottom:16px}
.sf-card h3{font-size:14px;font-weight:700;color:var(--a);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--br)}
.inp{width:100%;border:1.5px solid var(--br);border-radius:3px;padding:8px 12px;font-size:14px;font-family:inherit;color:var(--dk);outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--b)}
.inp-ta{resize:vertical;min-height:80px;line-height:1.6}
.inp-sm{font-size:13px;padding:6px 10px}
.inp-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gr);display:block;margin-bottom:5px}

/* ROW EDITOR (for ticker / opinions / etc.) */
.row-editor{background:var(--bg);border:1px solid var(--br);border-radius:6px;padding:12px;margin-bottom:8px;display:grid;gap:8px}
.row-del{background:var(--r);color:#fff;border:none;border-radius:3px;padding:4px 10px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;float:right}

/* TOASTS */
#toasts{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.t{background:var(--dk);color:#fff;padding:11px 18px;border-radius:4px;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,0.25);border-left:4px solid var(--g);min-width:240px;animation:tsin .2s ease}
.t.err{border-left-color:var(--r)}
@keyframes tsin{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}

.section-sep{height:1px;background:var(--br);margin:6px 0}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:0">
    <span class="tb-logo">Kore<b>Han</b> News</span>
    <span class="badge">Admin CMS</span>
  </div>
  <div class="tb-right">
    <a href="index.html" target="_blank" class="vsb">↗ View Site</a>
  </div>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sb">
    <div class="sb-lbl">Articles</div>
    <button class="sb-btn on" id="sb-all" onclick="goList()"><span class="ico">📰</span>All Articles<span class="pill" id="p-all">0</span></button>
    <button class="sb-btn" id="sb-new" onclick="openModal(null)"><span class="ico">✏️</span>New Article</button>
    <button class="sb-btn" onclick="goAutoArticle()"><span class="ico">🤖</span>AI Auto-Generate</button>

    <div class="sb-lbl">By Section</div>
    <button class="sb-btn" onclick="goFilter('사회')"> <span class="ico">🏙️</span>사회 Society <span class="pill" id="p-사회">0</span></button>
    <button class="sb-btn" onclick="goFilter('국제')"> <span class="ico">🌍</span>국제 World   <span class="pill" id="p-국제">0</span></button>
    <button class="sb-btn" onclick="goFilter('문화')"> <span class="ico">🎭</span>문화 Culture <span class="pill" id="p-문화">0</span></button>
    <button class="sb-btn" onclick="goFilter('Korea')"><span class="ico">🇰🇷</span>Korea        <span class="pill" id="p-Korea">0</span></button>
    <button class="sb-btn" onclick="goFilter('스포츠')"><span class="ico">⚽</span>스포츠 Sports<span class="pill" id="p-스포츠">0</span></button>
    <button class="sb-btn" onclick="goFilter('IT과학')"><span class="ico">💻</span>IT·과학      <span class="pill" id="p-IT과학">0</span></button>
    <button class="sb-btn" onclick="goFilter('오피니언')"><span class="ico">✍️</span>오피니언     <span class="pill" id="p-오피니언">0</span></button>

    <div class="section-sep"></div>
    <div class="sb-lbl">Analytics</div>
    <button class="sb-btn" onclick="goStats()"><span class="ico">📊</span>User Analytics</button>
    <div class="sb-lbl">Content</div>
    <button class="sb-btn" onclick="goSections()"><span class="ico">🗂️</span>Manage Sections</button>
    <div class="sb-lbl">Settings</div>
    <button class="sb-btn" onclick="goSiteSettings()"><span class="ico">⚙️</span>사이트 기본 설정</button>
    <button class="sb-btn" onclick="goOpinions()">    <span class="ico">✍️</span>오피니언 칼럼니스트</button>

    <div class="section-sep"></div>
    <div class="sb-lbl">학습 콘텐츠</div>
    <button class="sb-btn" onclick="goPhrases()"> <span class="ico">💬</span>오늘의 표현</button>
    <button class="sb-btn" onclick="goWordBank()"><span class="ico">📚</span>단어 플래시 카드</button>
    <button class="sb-btn" onclick="goSentences()"><span class="ico">💬</span>예문 관리</button>
    <div class="sb-lbl" style="margin-top:14px">운영 관리</div>
    <button class="sb-btn" onclick="goUsers()"><span class="ico">👥</span>가입 회원</button>
    <button class="sb-btn" onclick="goComments()"><span class="ico">💬</span>댓글 관리</button>
    <button class="sb-btn" onclick="goNewsletter()"><span class="ico">📬</span>뉴스레터</button>
    <button class="sb-btn" onclick="goStats()"><span class="ico">📊</span>방문자 통계</button>

    <div class="section-sep"></div>
    <div class="sb-lbl">🎓 수업 관리</div>
    <button class="sb-btn" onclick="goClassSlots()"><span class="ico">📅</span>수업 가능 날짜 설정</button>
    <button class="sb-btn" onclick="goClassBookings()"><span class="ico">📋</span>예약 현황</button>
    <button class="sb-btn" onclick="goClassCredits()"><span class="ico">🎟️</span>수업권 관리</button>
    <button class="sb-btn" onclick="goClassCurriculum()"><span class="ico">📈</span>커리큘럼 진행도</button>

    <div class="section-sep"></div>
    <div class="sb-lbl">데이터</div>
    <button class="sb-btn" onclick="doExport()"><span class="ico">💾</span>내보내기 (JSON)</button>
    <button class="sb-btn" onclick="document.getElementById('imp').click()"><span class="ico">📂</span>가져오기 (JSON)</button>
    <button class="sb-btn" onclick="resetAll()" style="color:#cc2200"><span class="ico">🔄</span>전체 초기화</button>
    <input type="file" id="imp" accept=".json" style="display:none" onchange="doImport(event)">
  </div>

  <!-- MAIN -->
  <div class="main" id="main"></div>
</div>

<!-- ARTICLE MODAL -->
<div class="ov" id="ov" style="display:none">
  <div class="mbox">
    <div class="m-hd"><h2 id="m-ttl">Article</h2><button class="m-x" id="m-x">✕</button></div>
    <div class="m-bd" id="m-bd"></div>
    <div class="m-ft">
      <button class="btn btn-gh" id="m-del-from-modal" style="background:#c33;color:#fff;margin-right:auto;display:none" onclick="deleteFromModal()">🗑 삭제</button>
      <button class="btn btn-gh" id="m-cancel">취소</button>
      <button class="btn btn-b" style="background:#555" id="m-draft">임시저장</button>
      <button class="btn btn-g" id="m-pub">✓ 발행</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="del-ov" id="del-ov" style="display:none">
  <div class="del-box">
    <div class="dico">🗑️</div>
    <h3>기사를 삭제할까요?</h3>
    <p id="del-msg">삭제하면 되돌릴 수 없습니다.</p>
    <div class="del-btns">
      <button class="btn btn-gh" id="del-cancel">취소</button>
      <button class="btn btn-r"  id="del-confirm">삭제</button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script>
'use strict';

// ══ ADMIN AUTH GATE ════════════════════════════════════════
// 1차: localStorage 토큰 빠른 체크 (페이지 깜빡임 방지)

(function() {
  var ADMIN_EMAIL = 'enane960819@gmail.com';

  function blockAccess(reason) {
    document.body.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0b1220;font-family:sans-serif">'

      + '</div></div>';

      for (var i = 0; i < keys.length; i++) {
        if (keys[i].startsWith('sb-') && keys[i].includes('-auth-token')) {
          var val = JSON.parse(localStorage.getItem(keys[i]));

      }

  var storedEmail = getStoredEmail();
  if (!storedEmail || storedEmail !== ADMIN_EMAIL) {

    if (document.readyState !== 'loading') blockAccess('You are not signed in as admin.');

  // 2차: SDK 세션 실시간 검증 (DOMContentLoaded 후)

// ══ HELPERS ════════════════════════════════════════════════
function ls(k,d){ try{const r=localStorage.getItem(k);if(r!=null)return JSON.parse(r);}catch(e){}return d; }
function lsSet(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function today(){ return new Date().toISOString().slice(0,10); }
function fdate(d){ try{return new Date(d+'T00:00:00').toLocaleDateString('ko-KR',{year:'numeric',month:'short',day:'numeric'});}catch(e){return d||'';} }
function toast(msg,isErr){
  const el=document.createElement('div');
  el.className='t'+(isErr?' err':'');
  el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3200);
}
function setSbOn(id){
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('on'));
  if(id){ const el=document.getElementById(id); if(el) el.classList.add('on'); }
}

const ADMIN_CLAUDE_PROXY = SUPA_URL_ADMIN + '/functions/v1/claude-proxy';

async function callClaude({ feature, model, max_tokens, messages }) {
  var sb = getSb();
  if (!sb) throw new Error('Supabase not initialized');
  var sessionData = await sb.auth.getSession();
  var session = sessionData.data && sessionData.data.session;
  var headers = { 'Content-Type': 'application/json' };
  if (session) headers['Authorization'] = 'Bearer ' + session.access_token;
  var resp = await fetch(ADMIN_CLAUDE_PROXY, {
    method: 'POST',
    headers: headers,
    body: JSON.stringify({ feature: feature, model: model, max_tokens: max_tokens, messages: messages }),
  });
  if (resp.status === 429) throw new Error('rate_limit');
  if (!resp.ok) {
    var err = await resp.json().catch(function(){ return {}; });
    throw new Error(err.error || 'API error ' + resp.status);
  }
  return resp.json();
}

async function dbLoadFromSupabase() {
  const sb = getSb();
  if (!sb) { console.warn('Supabase not available'); goList(); return; }
  try {
    const res = await sb.from('articles').select('*').order('date', { ascending: false });
    if (res.error) throw res.error;
    DB = res.data || [];
    goList();
  } catch(e) {
    toast('DB 로드 오류: ' + e.message, true);
    goList();
  }
}

async function dbSaveArticle(article) {
  const sb = getSb();
  if (!sb) return false;
  try {
    const res = await sb.from('articles').upsert(article, { onConflict: 'id' });
    if (res.error) throw res.error;
    return true;
  } catch(e) {
    toast('저장 오류: ' + e.message, true);
    return false;
  }
}

async function dbDeleteArticle(id) {
  const sb = getSb();
  if (!sb) return false;
  try {
    const res = await sb.from('articles').delete().eq('id', id);
    if (res.error) throw res.error;
    return true;
  } catch(e) {
    toast('삭제 오류: ' + e.message, true);
    return false;
  }
}

function adminExtractVocab(article){
  const text = (article.title||'') + ' ' + (article.body||'');
  const found = Object.keys(VOCAB_DICT).filter(function(k){ return text.indexOf(k) >= 0; });
  if(!found.length) return;
  found.sort(function(){ return Math.random()-0.5; });
  const picks = found.slice(0, 7);
  const wb = ls(K_WORDBANK, []);
  const existing = new Set(wb.map(function(w){ return w.ko; }));
  const toAdd = picks.filter(function(k){ return !existing.has(k); }).map(function(k){
    return { ko:k, rom:VOCAB_DICT[k].rom, en:VOCAB_DICT[k].en };
  });
  if(!toAdd.length) return;
  const merged = [...wb, ...toAdd].slice(-60);
  lsSet(K_WORDBANK, merged);
}

            </td>
            <td style="padding:8px;text-align:right">
              <button onclick='editSection(${s.id}, ${JSON.stringify(String(s.key || ""))}, ${JSON.stringify(String(s.label || ""))}, ${JSON.stringify(String(s.icon || ""))}, ${JSON.stringify(String(s.topics || ""))})'
                style="padding:4px 10px;background:#e8eef7;color:#2255a4;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;margin-right:6px">Edit</button>
              <button onclick='deleteSection(${s.id}, ${JSON.stringify(String(s.key || ""))})'
                style="padding:4px 10px;background:#fee2e2;color:#dc2626;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer">Delete</button>
            </td>
          </tr>`;
        }).join('')
      + '</table></div>';

  var el = document.getElementById('sections-list');
  if (el) el.innerHTML = html;
}

async function addSection() {
  var key    = (document.getElementById('ns-key')?.value||'').trim();
  var label  = (document.getElementById('ns-label')?.value||'').trim();
  var icon   = (document.getElementById('ns-icon')?.value||'📰').trim();
  var topics = (document.getElementById('ns-topics')?.value||'').trim();
  if (!key || !label) { toast('Key and Label are required', true); return; }

  var sb = getSb();
  if (!sb) return;
  var res = await sb.from('sections').insert({ key, label, icon, topics, sort_order:99, active:true });
  if (res.error) { toast('Error: ' + res.error.message, true); return; }
  toast('✅ Section "' + label + '" added!');
  document.getElementById('ns-key').value = '';
  document.getElementById('ns-label').value = '';
  document.getElementById('ns-icon').value = '';
  document.getElementById('ns-topics').value = '';
  await refreshSectionsList();
}

async function deleteSection(id, key) {
  if (!confirm('Delete section "' + key + '"? Articles in this section will NOT be deleted.')) return;
  var sb = getSb();
  if (!sb) return;
  await sb.from('sections').delete().eq('id', id);
  toast('🗑️ Section deleted');
  await refreshSectionsList();
}

async function toggleSection(id, active) {
  var sb = getSb();
  if (!sb) return;
  await sb.from('sections').update({ active }).eq('id', id);
  toast(active ? '✅ Section activated' : '🙈 Section hidden');
  await refreshSectionsList();
}

async function updateSectionOrder(id, order) {
  var sb = getSb();
  if (!sb) return;
  await sb.from('sections').update({ sort_order: parseInt(order) }).eq('id', id);
}

function editSection(id, key, label, icon, topics) {
  var newLabel  = prompt('Label:', label);  if (newLabel  === null) return;
  var newIcon   = prompt('Icon:',  icon);   if (newIcon   === null) return;
  var newTopics = prompt('AI Topics:', topics); if (newTopics === null) return;
  var sb = getSb();
  if (!sb) return;
  sb.from('sections').update({ label:newLabel, icon:newIcon, topics:newTopics }).eq('id', id)
    .then(function(){ toast('✅ Updated'); refreshSectionsList(); });
}

async function loadApiKeyIntoSettings() {
  const statusEl = document.getElementById('sc-api-status');
  const input = document.getElementById('sc-api-key');
  if (!input) return;
  try {
    var sb = getSb();
    if (sb) {
      var res = await sb.from('app_settings').select('value,updated_at').eq('key','anthropic_key').single();
      if (res.data && res.data.value) {
        input.value = res.data.value;
        var d = new Date(res.data.updated_at).toLocaleDateString('ko-KR');
        if (statusEl) statusEl.textContent = '✅ 저장된 키 있음 (마지막 업데이트: ' + d + ')';
        return;
      }
    }
  } catch(e) {}
  // 로컬 캐시
  var local = localStorage.getItem('kh_anthropic_key') || '';
  if (local) { input.value = local; if (statusEl) statusEl.textContent = '⚠️ 로컬 캐시만 있음 — 저장 버튼 눌러서 Supabase에 저장하세요'; }
  else { if (statusEl) statusEl.textContent = '❌ 저장된 키 없음'; }
}

async function saveApiKey() {
  const input = document.getElementById('sc-api-key');
  const statusEl = document.getElementById('sc-api-status');
  if (!input) return;
  const key = input.value.trim();
  if (!key || !key.startsWith('sk-ant-')) { toast('올바른 API 키를 입력해주세요 (sk-ant-...)', true); return; }
  try {
    var sb = getSb();
    if (!sb) throw new Error('Supabase not ready');
    var res = await sb.from('app_settings').upsert({ key: 'anthropic_key', value: key, updated_at: new Date().toISOString() });
    if (res.error) throw res.error;
    localStorage.setItem('kh_anthropic_key', key);
    toast('🔑 API 키 저장 완료! 모든 유저에게 적용됩니다.');
    if (statusEl) statusEl.textContent = '✅ 저장 완료 (' + new Date().toLocaleDateString('ko-KR') + ')';
  } catch(e) {
    toast('저장 실패: ' + (e.message || e), true);
  }
}

async function loadAutoApiKey(){
  const input = document.getElementById('auto-api-key');
  if (!input) return;
  // 로컬 캐시 먼저
  const local = localStorage.getItem('kh_anthropic_key') || '';
  if (local) input.value = local;
  // Supabase에서 최신값 가져오기
  try {
    var sb = getSb();
    if (sb) {
      var res = await sb.from('app_settings').select('value').eq('key','anthropic_key').single();
      if (res.data && res.data.value) {
        input.value = res.data.value;
        localStorage.setItem('kh_anthropic_key', res.data.value);
      }
    }
  } catch(e) {}
}

async function runAutoGenerate(){
  const keyInput = document.getElementById('auto-api-key');
  const apiKey   = keyInput ? keyInput.value.trim() : '';
  if(!apiKey){ toast('API 키를 입력해 주세요', true); return; }
  // localStorage + Supabase 둘 다 저장
  localStorage.setItem('kh_anthropic_key', apiKey);
  try {
    var sb = getSb();
    if (sb) await sb.from('app_settings').upsert({ key: 'anthropic_key', value: apiKey, updated_at: new Date().toISOString() });
  } catch(e) {}

  const difficulty = document.getElementById('auto-difficulty') ? document.getElementById('auto-difficulty').value : 'Intermediate';
  const diffMap = {
    'Beginner': { ko:'초급 (TOPIK 1~2급, 초등학교 수준)', vocab:'아주 쉬운 일상 어휘, 짧은 문장, ~해요/~이에요 체', level:'Beginner' },
    'Intermediate': { ko:'중급 (TOPIK 3~4급, 중학교 수준)', vocab:'일반 뉴스 어휘, 중간 난이도 문장', level:'Intermediate' },
    'Advanced': { ko:'고급 (TOPIK 5~6급, 원어민 수준)', vocab:'고급 한자어, 복잡한 문장 구조, 뉴스 문체', level:'Advanced' },
  };
  const diffInfo = diffMap[difficulty] || diffMap['Intermediate'];
  const checked = [...document.querySelectorAll('#main input[type=checkbox]:checked')].map(function(c){ return c.value; });
  if(!checked.length){ toast('Please select at least one section', true); return; }

  const progress = document.getElementById('auto-progress');
  progress.innerHTML = '';

  for(const secKey of checked){
    const sec = AUTO_SECTIONS.find(function(s){ return s.key === secKey; });
    if(!sec) continue;

    const rowId = 'prog-'+secKey;
    progress.innerHTML += '<div id="'+rowId+'" style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border:1px solid var(--bo);border-radius:8px;margin-bottom:8px">'
      +'<span style="font-size:18px">'+sec.icon+'</span>'
      +'<span style="font-weight:700">'+sec.key+'</span>'
      +'<span id="'+rowId+'-status" style="color:var(--gr);font-size:13px">⏳ 생성 중…</span>'
      +'</div>';

    try {
      const today = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'});
      const prompt = '당신은 외국인 한국어 학습자를 위한 뉴스 기사를 쓰는 편집자입니다. '
        +'오늘(' + today + ')을 기준으로 ' + sec.key + ' 분야(' + sec.topics + ')에서 '
        +'실제로 화제가 되고 있는 이슈를 바탕으로 기사를 작성해 주세요.\n\n'
        +'[난이도: ' + diffInfo.ko + ']\n'
        +'[어휘 수준: ' + diffInfo.vocab + ']\n\n'
        +'[독자 대상]\n'
        +'- 한국어를 공부하는 외국인 (' + diffInfo.ko + ')\n'
        +'- 뉴스를 읽으면서 자연스럽게 한국어를 배우고 싶은 성인 학습자\n\n'
        +'[문체 및 형식]\n'
        +'- 짧고 명확한 문장 (한 문장에 20~35자 이내)\n'
        +'- 문장 끝은 "~했어요", "~입니다", "~예요" 등 정중체 사용\n'
        +'- 단락마다 한 가지 내용만, 각 단락 2~3문장\n\n'
        +'[어휘]\n'
        +'- 초등 고학년~중학교 수준 어휘 사용\n'
        +'- 어려운 한자어나 전문 용어는 반드시 괄호로 쉬운 뜻 설명\n'
        +'  예: 기준금리(돈을 빌릴 때 기본이 되는 이자율)\n'
        +'- 영어 단어는 원어도 함께 표기: 인공지능(AI)\n\n'
        +'[분량]\n'
        +'- 제목: 15~25자, 핵심 내용을 쉽게 표현\n'
        +'- 본문: 4~6개 단락, 각 단락 2~3문장\n\n'
        +'[주의사항]\n'
        +'- 실제 최근 이슈 기반 (완전 허구 불가)\n'
        +'- 특정 실존 인물 비방 금지\n'
        +'- 너무 유치하게 쓰지 말 것 — 성인 학습자용\n\n'
        +'응답은 반드시 아래 JSON 형식으로만 출력하세요 (마크다운 코드블록 불필요):\n'
        +'{"title":"기사 제목","body":"기사 본문 (단락 구분은 \\n\\n 사용)"}';

      const res = await callClaude({
        feature: 'generate',
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages: [{role:'user', content: prompt}]
      });

      const data = res;
      const text = data.content && data.content[0] && data.content[0].text || '';
      if(!text) throw new Error('빈 응답');

      // Parse JSON response
      const clean = text.replace(/^```json?\n?/, '').replace(/\n?```$/, '').trim();
      const article = JSON.parse(clean);

      if(!article.title || !article.body) throw new Error('Invalid format');

      // Save to DB as draft
      const newArticle = {
        id: uid(),
        section: sec.key,
        title: article.title,
        body: article.body,
        date: today_date(),
        status: 'draft',
        featured: false,
        level: diffInfo.level,
        image: 'https://picsum.photos/seed/' + Math.random().toString(36).slice(2,8) + '/600/400',
      };
      await dbSaveArticle(newArticle);
      DB.unshift(newArticle);
      refreshCounts();

      document.getElementById(rowId+'-status').innerHTML =
        '<span style="color:#28a745;font-weight:700">✅ 완료 — </span>'
        +"<a href=\"#\" onclick=\"openModal('"+newArticle.id+"')\" style=\"color:var(--a);font-weight:700\">검토 후 발행하기 →</a>";

    } catch(err) {
      document.getElementById(rowId+'-status').innerHTML =
        '<span style="color:#dc3545">❌ 실패: '+err.message+'</span>';
    }
  }

  toast('🤖 기사 생성 완료! 임시저장 목록에서 확인하세요.');
}

function today_date(){
  return new Date().toISOString().split('T')[0];
}

async function loadAllComments() {
  var wrap = document.getElementById('comments-admin-wrap');
  try {
    var res = await fetch(SUPA_URL_ADMIN+'/rest/v1/comments?order=created_at.desc&limit=100', { headers: { 'apikey':SUPA_KEY_ADMIN,'Authorization':'Bearer '+SUPA_KEY_ADMIN } });
    var rows = res.ok ? await res.json() : [];
    if(!rows.length) { wrap.innerHTML='<div class="infobox">아직 댓글이 없어요.</div>'; return; }

    wrap.innerHTML = '<div style="font-size:13px;color:var(--gr);margin-bottom:12px">총 '+rows.length+'개 댓글</div>'
      + rows.map(function(c) {
          var art = DB.find(function(a){ return a.id===c.article_id; });
          var artTitle = art ? art.title : c.article_id;
          var dateStr  = new Date(c.created_at).toLocaleDateString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
          return '<div style="background:#fff;border:1px solid var(--bo);border-radius:10px;padding:16px 18px;margin-bottom:10px">'
            +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'
            +'<div style="font-size:12px;color:var(--gr)">'
            +'<a href="korehan-article.html?id='+c.article_id+'" target="_blank" style="color:var(--a);font-weight:700">'+artTitle+'</a>'
            +' · '+c.user_name+' · '+dateStr
            +'</div>'
            +'<button data-id="'+c.id+'" onclick="adminDeleteComment(this.dataset.id)" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:13px;padding:2px 6px">🗑</button>'
            +'</div>'
            +'<div style="font-size:14px;color:#222;margin-bottom:10px">'+c.body+'</div>'
            +(c.reply
              ? '<div style="background:#f0f4ff;border-left:3px solid var(--a);padding:8px 12px;border-radius:0 6px 6px 0;font-size:13px;margin-bottom:8px"><b>내 답변:</b> '+c.reply+'</div>'
              : ''
            )
            +'<div style="display:flex;gap:8px;align-items:flex-end">'
            +'<textarea data-id="'+c.id+'" placeholder="답변 입력…" style="flex:1;padding:8px 12px;border:1.5px solid var(--bo);border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;min-height:60px">'+(c.reply||'')+'</textarea>'
            +'<button data-id="'+c.id+'" onclick="adminReplyComment(this.dataset.id,this)" style="padding:8px 18px;background:var(--a);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">답변 저장</button>'
            +'</div>'
            +'</div>';
        }).join('');
  } catch(e) {
    wrap.innerHTML = '<div class="infobox" style="color:#c33">⚠️ 로드 실패: '+e.message+'</div>';
  }
}

async function adminReplyComment(id, btn) {
  var ta = document.querySelector('textarea[data-id="'+id+'"]');
  if(!ta) return;
  var reply = ta.value.trim();
  if(!reply) return;
  btn.disabled = true; btn.textContent = '저장 중…';
  await fetch(SUPA_URL_ADMIN+'/rest/v1/comments?id=eq.'+id, {
    method:'PATCH',
    headers:{ 'apikey':SUPA_KEY_ADMIN,'Authorization':'Bearer '+SUPA_KEY_ADMIN,'Content-Type':'application/json','Prefer':'return=minimal' },
    body: JSON.stringify({ reply:reply, replied_at:new Date().toISOString() })
  });
  btn.disabled = false; btn.textContent = '답변 저장';
  toast('✅ 답변이 저장됐어요!');
}

async function adminDeleteComment(id) {
  if(!confirm('댓글을 삭제할까요?')) return;
  await fetch(SUPA_URL_ADMIN+'/rest/v1/comments?id=eq.'+id, {
    method:'DELETE',
    headers:{ 'apikey':SUPA_KEY_ADMIN,'Authorization':'Bearer '+SUPA_KEY_ADMIN }
  });
  loadAllComments();
  toast('🗑 삭제됐어요.');
}

      +'<th style="padding:8px 12px;text-align:left;color:var(--gr)">구독일</th>'

function exportNlCsv() {
  if(!window._nlRows) return;
  var csv = '이름,이메일,구독일,상태\n'
    + window._nlRows.map(function(r){
        return [r.name||'',r.email,new Date(r.subscribed_at).toLocaleDateString('ko-KR'),r.active?'구독중':'취소됨'].join(',');
      }).join('\n');
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'korehan_newsletter_'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
}

async function loadStats() {
  var wrap = document.getElementById('stats-admin-wrap');
  try {
    var since = new Date(Date.now()-30*86400000).toISOString();
    var res = await fetch(SUPA_URL_ADMIN+'/rest/v1/page_views?viewed_at=gte.'+since+'&order=viewed_at.desc&limit=2000', { headers: { 'apikey':SUPA_KEY_ADMIN,'Authorization':'Bearer '+SUPA_KEY_ADMIN } });
    var rows = res.ok ? await res.json() : [];

    var totalViews = rows.length;
    var todayStr   = new Date().toISOString().split('T')[0];
    var todayViews = rows.filter(function(r){ return r.viewed_at.startsWith(todayStr); }).length;

    // Daily counts (last 14 days)
    var daily = {};
    for(var d=13; d>=0; d--) {
      var dt = new Date(Date.now()-d*86400000).toISOString().split('T')[0];
      daily[dt] = rows.filter(function(r){ return r.viewed_at.startsWith(dt); }).length;
    }

    // Top articles
    var artCounts = {};
    rows.filter(function(r){ return r.article_id; }).forEach(function(r){
      artCounts[r.article_id] = (artCounts[r.article_id]||0)+1;
    });
    var topArts = Object.entries(artCounts).sort(function(a,b){ return b[1]-a[1]; }).slice(0,10);

    var maxVal = Math.max.apply(null, Object.values(daily).concat([1]));

    wrap.innerHTML =
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px">'
      +'<div style="background:#fff;border:1px solid var(--bo);border-radius:10px;padding:18px;text-align:center">'
      +'<div style="font-size:32px;font-weight:900;color:var(--a)">'+totalViews+'</div><div style="font-size:12px;color:var(--gr);font-weight:700">30일 총 페이지뷰</div></div>'
      +'<div style="background:#fff;border:1px solid var(--bo);border-radius:10px;padding:18px;text-align:center">'
      +'<div style="font-size:32px;font-weight:900;color:var(--a)">'+todayViews+'</div><div style="font-size:12px;color:var(--gr);font-weight:700">오늘 페이지뷰</div></div>'
      +'<div style="background:#fff;border:1px solid var(--bo);border-radius:10px;padding:18px;text-align:center">'
      +'<div style="font-size:32px;font-weight:900;color:var(--a)">'+topArts.length+'</div><div style="font-size:12px;color:var(--gr);font-weight:700">조회된 기사 수</div></div>'
      +'</div>'

      // 바 차트
      +'<div style="background:#fff;border:1px solid var(--bo);border-radius:10px;padding:20px;margin-bottom:20px">'
      +'<div style="font-size:14px;font-weight:700;color:var(--dk);margin-bottom:16px">최근 14일 일별 페이지뷰</div>'
      +'<div style="display:flex;align-items:flex-end;gap:6px;height:100px">'
      + Object.entries(daily).map(function(e){
          var h = Math.round((e[1]/maxVal)*90)+4;
          var isToday = e[0]===todayStr;
          return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">'
            +'<div style="font-size:10px;color:var(--gr)">'+e[1]+'</div>'
            +'<div style="width:100%;height:'+h+'px;background:'+(isToday?'var(--a)':'#c5d5f0')+';border-radius:4px 4px 0 0"></div>'
            +'<div style="font-size:9px;color:var(--gr)">'+e[0].slice(5)+'</div>'
            +'</div>';
        }).join('')
      +'</div></div>'

      // 인기 기사
      +'<div style="background:#fff;border:1px solid var(--bo);border-radius:10px;padding:20px">'
      +'<div style="font-size:14px;font-weight:700;color:var(--dk);margin-bottom:14px">🏆 Top Articles</div>'
      + (topArts.length ? topArts.map(function(e,i){
          var art = DB.find(function(a){ return a.id===e[0]; });
          var title = art ? art.title : e[0];
          return '<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--bo)">'
            +'<span style="font-size:16px;font-weight:900;color:var(--a);width:24px;text-align:right">'+(i+1)+'</span>'
            +'<div style="flex:1;font-size:13px;font-weight:600">'+title+'</div>'
            +'<span style="font-size:13px;font-weight:700;color:var(--gr)">'+e[1]+'회</span>'
            +'</div>';
        }).join('') : '<div style="color:var(--gr);font-size:13px">데이터가 없어요.</div>')
      +'</div>';
  } catch(e) {
    wrap.innerHTML = '<div class="infobox" style="color:#c33">⚠️ 로드 실패: '+e.message+'</div>';
  }
}

async function loadUsers(){
  try {
    // saved_words 기준으로 활동한 유저 집계
    const [words, articles, quizzes, streaks] = await Promise.all([
      supaAdminGet('/rest/v1/saved_words?select=user_id,ko,created_at&order=created_at.desc'),
      supaAdminGet('/rest/v1/read_articles?select=user_id,title,section,read_at&order=read_at.desc'),
      supaAdminGet('/rest/v1/quiz_results?select=user_id,correct,total,played_at&order=played_at.desc'),
      supaAdminGet('/rest/v1/study_streaks?select=*&order=streak.desc'),
    ]);

    // Aggregate by user_id
    const users = {};
    function getUser(uid){
      if(!users[uid]) users[uid] = { id:uid, words:0, articles:0, quizzes:0, streak:0, lastSeen:null };
      return users[uid];
    }
    (words||[]).forEach(function(r){ var u=getUser(r.user_id); u.words++; if(!u.lastSeen||r.created_at>u.lastSeen) u.lastSeen=r.created_at; });
    (articles||[]).forEach(function(r){ var u=getUser(r.user_id); u.articles++; if(!u.lastSeen||r.read_at>u.lastSeen) u.lastSeen=r.read_at; });
    (quizzes||[]).forEach(function(r){ var u=getUser(r.user_id); u.quizzes++; });
    (streaks||[]).forEach(function(r){ if(users[r.user_id]) users[r.user_id].streak = r.streak; });

    const list = Object.values(users).sort(function(a,b){ return (b.lastSeen||'') > (a.lastSeen||'') ? 1 : -1; });

    const el = document.getElementById('users-wrap');
    if(!list.length){
      el.innerHTML = '<div class="infobox">아직 가입한 회원이 없습니다. 로그인한 회원이 활동을 시작하면 여기 표시됩니다.</div>';
      return;
    }

    el.innerHTML =
      '<div style="margin-bottom:12px;font-size:13px;color:var(--gray)">총 '+list.length+'명</div>'
      +'<table style="width:100%;border-collapse:collapse;font-size:13px">'
      +'<thead><tr style="border-bottom:2px solid var(--border);text-align:left">'
      +'<th style="padding:8px 12px;color:var(--gray);font-weight:700">User ID</th>'
      +'<th style="padding:8px 12px;color:var(--gray);font-weight:700">저장단어</th>'
      +'<th style="padding:8px 12px;color:var(--gray);font-weight:700">읽은기사</th>'
      +'<th style="padding:8px 12px;color:var(--gray);font-weight:700">퀴즈횟수</th>'
      +'<th style="padding:8px 12px;color:var(--gray);font-weight:700">🔥연속일</th>'
      +'<th style="padding:8px 12px;color:var(--gray);font-weight:700">마지막 활동</th>'
      +'</tr></thead><tbody>'
      + list.map(function(u){
          var lastSeen = u.lastSeen ? new Date(u.lastSeen).toLocaleDateString('ko-KR') : '-';
          var shortId = u.id.slice(0,8)+'…';
          return '<tr style="border-bottom:1px solid var(--border)">'
            +'<td style="padding:10px 12px;font-family:monospace;font-size:12px;color:var(--gray)" title="'+u.id+'">'+shortId+'</td>'
            +'<td style="padding:10px 12px;font-weight:700;color:var(--accent)">'+u.words+'</td>'
            +'<td style="padding:10px 12px">'+u.articles+'</td>'
            +'<td style="padding:10px 12px">'+u.quizzes+'</td>'
            +'<td style="padding:10px 12px">'+(u.streak||0)+'</td>'
            +'<td style="padding:10px 12px;color:var(--gray)">'+lastSeen+'</td>'
            +'</tr>';
        }).join('')
      +'</tbody></table>';

  } catch(err) {
    document.getElementById('users-wrap').innerHTML =
      '<div class="infobox" style="color:#c33">⚠️ 데이터 불러오기 실패: '+err.message+'</div>';
  }
}

// ── 수업 가능 날짜 설정 ──────────────────────────────────────
async function goClassSlots() {
  activeSb('');
  const sb = getSb();
  let slots = [];
  if (sb) {
    const { data } = await sb.from('available_slots')
      .select('*').order('slot_date').order('slot_time');
    slots = data || [];
  }

  const slotMap = {};
  slots.forEach(s => { if (!slotMap[s.slot_date]) slotMap[s.slot_date] = []; slotMap[s.slot_date].push(s); });

  document.getElementById('main').innerHTML = `
  <div style="padding:28px 32px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <h2 style="font-size:20px;font-weight:900">📅 수업 가능 날짜 설정</h2>
      <button class="btn btn-g" onclick="openSlotModal()">+ 슬롯 추가</button>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">
      ${buildAdminCal(new Date(), slotMap)}
    </div>

    <div style="background:#fff;border:1px solid var(--br);border-radius:12px;padding:22px">
      <div style="font-size:14px;font-weight:800;margin-bottom:14px;color:#0b1626">전체 슬롯 목록</div>
      ${buildSlotList(slots)}
    </div>
  </div>`;
}

function buildAdminCal(base, slotMap) {
  const months = [new Date(base.getFullYear(), base.getMonth(), 1),
                  new Date(base.getFullYear(), base.getMonth()+1, 1)];
  return months.map(m => {
    const yr = m.getFullYear(), mo = m.getMonth();
    const dim = new Date(yr, mo+1, 0).getDate();
    const fd  = m.getDay();
    const name = m.toLocaleString('ko-KR',{year:'numeric',month:'long'});
    let h = `<div style="background:#fff;border:1px solid var(--br);border-radius:12px;padding:20px">
      <div style="font-size:13px;font-weight:800;margin-bottom:12px">${name}</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center">
        ${['일','월','화','수','목','금','토'].map(d=>`<div style="font-size:11px;color:#94a3b8;font-weight:700;padding:3px">${d}</div>`).join('')}
        ${'<div></div>'.repeat(fd)}`;
    for (let d=1; d<=dim; d++) {
      const ds = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const ds2 = slotMap[ds] || [];
      const isPast = ds < new Date().toISOString().split('T')[0];
      const bg = ds2.length ? '#2255a4' : (isPast ? '#f8faff' : '#fff');
      const col = ds2.length ? '#fff' : (isPast ? '#d0d8e8' : '#0b1626');
      const bor = ds2.length ? 'none' : '1px solid #e2e8f0';
      h += `<div style="border-radius:6px;background:${bg};border:${bor};position:relative;overflow:hidden">
        <button onclick="openSlotModal('${ds}')" style="width:100%;padding:5px 2px;border:none;background:transparent;color:${col};font-size:12px;font-weight:700;cursor:pointer" title="${ds2.length}개 슬롯">
          ${d}${ds2.length ? `<span style="display:block;font-size:8px;opacity:.8">${ds2.length}개</span>` : ''}
        </button></div>`;
    }
    h += '</div></div>';
    return h;
  }).join('');
}

function buildSlotList(slots) {
  if (!slots.length) return '<p style="color:#94a3b8;font-size:14px">등록된 슬롯이 없습니다.</p>';
  const byDate = {};
  slots.forEach(s => { if (!byDate[s.slot_date]) byDate[s.slot_date] = []; byDate[s.slot_date].push(s); });
  return Object.entries(byDate).slice(0,14).map(([date, ds]) => {
    const label = new Date(date+'T12:00:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
    return `<div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:800;color:#0b1626;margin-bottom:6px">${label}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${ds.map(s => {
          const tmap = {both:'그룹+개인', solo:'개인', group:'그룹'};
          return `<div style="display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;background:${s.is_open?'#f0f6ff':'#f8faff'};border:1.5px solid ${s.is_open?'#2255a4':'#e2e8f0'}">
            <span style="font-size:13px;font-weight:700;color:#0b1626">${s.slot_time.slice(0,5)}</span>
            <span style="font-size:11px;color:#64748b">${tmap[s.plan_type]||s.plan_type}</span>
            <span style="font-size:11px;color:#94a3b8">${s.booked_count}/${s.max_students}</span>
            <button onclick="toggleAdminSlot(${s.id},${s.is_open})" style="font-size:10px;padding:2px 7px;border:none;border-radius:4px;cursor:pointer;background:${s.is_open?'#fef2f2':'#f0fdf4'};color:${s.is_open?'#cc2200':'#15803d'};font-weight:700">${s.is_open?'닫기':'열기'}</button>
            <button onclick="deleteAdminSlot(${s.id})" style="font-size:10px;padding:2px 7px;border:none;border-radius:4px;cursor:pointer;background:#fef2f2;color:#cc2200;font-weight:700">삭제</button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function openSlotModal(dateStr) {
  const id = 'slot-add-modal';
  const existing = document.getElementById(id);
  if (existing) existing.remove();
  const m = document.createElement('div');
  m.id = id;
  m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center';
  m.innerHTML = `
    <div style="background:#fff;border-radius:16px;padding:32px;width:400px;max-width:95vw">
      <h3 style="font-size:17px;font-weight:900;margin-bottom:20px">슬롯 추가</h3>
      <div style="display:flex;flex-direction:column;gap:13px">
        <label style="font-size:13px;font-weight:700;color:#445566">날짜
          <input type="date" id="sl-date" value="${dateStr||''}" style="display:block;width:100%;margin-top:5px;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none">
        </label>
        <label style="font-size:13px;font-weight:700;color:#445566">시간
          <input type="time" id="sl-time" style="display:block;width:100%;margin-top:5px;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none">
        </label>
        <label style="font-size:13px;font-weight:700;color:#445566">수업 유형
          <select id="sl-type" style="display:block;width:100%;margin-top:5px;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none">
            <option value="both">그룹 + 개인 모두 가능</option>
            <option value="solo">개인 전용</option>
            <option value="group">그룹 전용</option>
          </select>
        </label>
        <label style="font-size:13px;font-weight:700;color:#445566">최대 그룹 인원
          <input type="number" id="sl-max" value="4" min="1" max="8" style="display:block;width:100%;margin-top:5px;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none">
        </label>
      </div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button onclick="document.getElementById('slot-add-modal').remove()" class="btn btn-gh" style="flex:1">취소</button>
        <button onclick="saveAdminSlot()" class="btn btn-g" style="flex:1">저장</button>
      </div>
    </div>`;
  document.body.appendChild(m);
}

async function saveAdminSlot() {
  const sb = getSb(); if (!sb) return;
  const date = document.getElementById('sl-date').value;
  const time = document.getElementById('sl-time').value;
  const type = document.getElementById('sl-type').value;
  const max  = parseInt(document.getElementById('sl-max').value) || 4;
  if (!date || !time) { alert('날짜와 시간을 입력하세요'); return; }
  const { error } = await sb.from('available_slots').upsert(
    { slot_date:date, slot_time:time, plan_type:type, max_students:max, is_open:true },
    { onConflict:'slot_date,slot_time,plan_type' }
  );
  if (error) { alert('저장 실패: '+error.message); return; }
  document.getElementById('slot-add-modal')?.remove();
  goClassSlots();
}

async function toggleAdminSlot(id, isOpen) {
  const sb = getSb(); if (!sb) return;
  await sb.from('available_slots').update({ is_open:!isOpen }).eq('id',id);
  goClassSlots();
}

async function deleteAdminSlot(id) {
  if (!confirm('슬롯을 삭제할까요?')) return;
  const sb = getSb(); if (!sb) return;
  await sb.from('available_slots').delete().eq('id',id);
  goClassSlots();
}

// ── 예약 현황 ────────────────────────────────────────────────
async function goClassBookings() {

  <div style="padding:28px 32px">
    <h2 style="font-size:20px;font-weight:900;margin-bottom:20px">📋 예약 현황</h2>
    ${!bookings.length ? '<p style="color:#94a3b8">예약 내역이 없습니다.</p>' :
    `<div style="background:#fff;border:1px solid var(--br);border-radius:12px;overflow:auto">
      <table style="width:100%;border-collapse:collapse;font-size:13px;min-width:600px">
        <thead><tr style="background:#f8faff;border-bottom:2px solid #e2e8f0">

          <th style="padding:12px 16px;text-align:left;font-weight:800">유형</th>
          <th style="padding:12px 16px;text-align:left;font-weight:800">상태</th>
          <th style="padding:12px 16px;text-align:left;font-weight:800">메모</th>
          <th style="padding:12px 16px;text-align:left;font-weight:800">액션</th>
        </tr></thead>
        <tbody>
          ${bookings.map(b => {
            const u = b.profiles||{}, sl = b.available_slots||{};
            const ds = sl.slot_date ? new Date(sl.slot_date+'T12:00:00').toLocaleDateString('ko-KR',{month:'short',day:'numeric',weekday:'short'}) : '-';
            return `<tr style="border-bottom:1px solid #f0f4f8">
              <td style="padding:11px 16px;font-weight:600">${u.display_name||u.email||b.user_id?.slice(0,8)}</td>
              <td style="padding:11px 16px;color:#445566">${ds} ${(sl.slot_time||'').slice(0,5)}</td>
              <td style="padding:11px 16px"><span style="background:${b.plan_type==='solo'?'#eff6ff':'#f0fdf4'};color:${b.plan_type==='solo'?'#2255a4':'#15803d'};padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700">${b.plan_type==='solo'?'개인':'그룹'}</span></td>
              <td style="padding:11px 16px;font-weight:700;color:${SC[b.status]||'#94a3b8'}">${SK[b.status]||b.status}</td>
              <td style="padding:11px 16px;color:#94a3b8;font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis">${b.memo||'-'}</td>
              <td style="padding:11px 16px;display:flex;gap:6px;flex-wrap:wrap">
                ${b.status==='pending' ? `
                  <button onclick="adminUpdateBooking(${b.id},'confirmed')" style="padding:4px 10px;background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">✓ 확정</button>
                  <button onclick="adminUpdateBooking(${b.id},'cancelled')" style="padding:4px 10px;background:#fef2f2;color:#cc2200;border:1px solid #fecaca;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">✕ 취소</button>` : ''}
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`}
  </div>`;
}

async function adminUpdateBooking(id, status) {
  const sb = getSb(); if (!sb) return;
  await sb.from('bookings').update({ status }).eq('id', id);
  // 확정 시 수업권 차감
  if (status === 'confirmed') {
    const { data: bk } = await sb.from('bookings').select('user_id,plan_type').eq('id',id).single();
    if (bk) {
      const { data: cr } = await sb.from('session_credits')
        .select('id,used').eq('user_id',bk.user_id).eq('plan_type',bk.plan_type)
        .order('created_at').limit(1).single();
      if (cr) await sb.from('session_credits').update({ used: cr.used+1 }).eq('id',cr.id);
    }
  }
  goClassBookings();
}

function openCreditModal() {
  document.getElementById('credit-modal').style.display = 'flex';

async function saveCredit() {
  const sb = getSb(); if (!sb) return;
  const uid = document.getElementById('cr-uid').value.trim();
  const type = document.getElementById('cr-type').value;
  const qty  = parseInt(document.getElementById('cr-qty').value)||0;
  if (!uid||qty<1) { alert('User ID와 수량을 입력하세요'); return; }
  const { error } = await sb.from('session_credits').insert({ user_id:uid, plan_type:type, total:qty, used:0 });
  if (error) { alert('저장 실패: '+error.message); return; }
  document.getElementById('credit-modal').style.display = 'none';
  goClassCredits();
}

// ── 커리큘럼 진행도 ──────────────────────────────────────────
async function goClassCurriculum() {
  activeSb('');
  const sb = getSb();
  let users = [], progressAll = [];
  if (sb) {
    const { data: p } = await sb.from('profiles').select('id,display_name,email').limit(100);
    users = p || [];
    const { data: pr } = await sb.from('curriculum_progress').select('*');
    progressAll = pr || [];
  }
  const progMap = {};
  progressAll.forEach(p => {
    if (!progMap[p.user_id]) progMap[p.user_id] = {};
    progMap[p.user_id][p.lesson_key] = p;
  });
  const totalLessons = Object.values(ADMIN_CUR_LESSONS).flat().length;

  document.getElementById('main').innerHTML = `
  <div style="padding:28px 32px">
    <h2 style="font-size:20px;font-weight:900;margin-bottom:20px">📈 커리큘럼 진행도</h2>
    <div style="display:grid;grid-template-columns:200px 1fr;gap:20px;min-height:500px">
      <div style="background:#fff;border:1px solid var(--br);border-radius:12px;overflow:hidden;align-self:start">
        <div style="padding:10px 14px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#94a3b8;background:#f8faff;border-bottom:1px solid #e2e8f0">수강생 (${users.length})</div>
        ${!users.length ? '<p style="padding:14px;color:#94a3b8;font-size:13px">없음</p>' :
          users.map((u,i) => {
            const up = progMap[u.id]||{};
            const done = Object.values(up).filter(p=>p.completed).length;
            return `<button id="cu-${u.id}" onclick="selectCurrUser('${u.id}')"
              style="width:100%;text-align:left;padding:10px 14px;border:none;cursor:pointer;border-bottom:1px solid #f0f4f8;transition:background .15s;background:${i===0?'#f0f6ff':'transparent'}"
              onmouseover="if(!this.classList.contains('on'))this.style.background='#f8faff'" onmouseout="if(!this.classList.contains('on'))this.style.background='transparent'">
              <div style="font-size:13px;font-weight:700;color:#0b1626;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${u.display_name||u.email||u.id.slice(0,8)}</div>
              <div style="font-size:11px;color:#94a3b8;margin-top:2px">${done}/${totalLessons} 완료</div>
            </button>`;
          }).join('')}
      </div>
      <div id="curr-panel" style="background:#fff;border:1px solid var(--br);border-radius:12px;padding:22px">
        <p style="color:#94a3b8;font-size:14px">수강생을 선택하세요.</p>
      </div>
    </div>
  </div>`;

  window._adminProgMap = progMap;
  window._adminUsers   = users;
  if (users.length) selectCurrUser(users[0].id);
}

async function selectCurrUser(uid) {
  document.querySelectorAll('[id^="cu-"]').forEach(b=>{ b.style.background='transparent'; b.classList.remove('on'); });
  const btn = document.getElementById('cu-'+uid);
  if (btn) { btn.style.background='#f0f6ff'; btn.classList.add('on'); }

  const prog = (window._adminProgMap||{})[uid]||{};
  const LC = { beginner:{bg:'#eff6ff',text:'#1d4ed8',bar:'#2255a4'}, intermediate:{bg:'#f0fdf4',text:'#15803d',bar:'#16a34a'}, advanced:{bg:'#fef2f2',text:'#b91c1c',bar:'#cc2200'} };
  const LL = { beginner:'초급', intermediate:'중급', advanced:'고급' };

  let h = '';
  for (const [level, lessons] of Object.entries(ADMIN_CUR_LESSONS)) {
    const lc   = LC[level];
    const done = lessons.filter((_,i)=>(prog[level+'_'+(i+1)]||{}).completed).length;
    const pct  = Math.round(done/lessons.length*100);
    h += `<div style="margin-bottom:24px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <span style="background:${lc.bg};color:${lc.text};font-size:11px;font-weight:800;padding:3px 10px;border-radius:99px;text-transform:uppercase">${LL[level]}</span>
        <span style="font-size:12px;color:#64748b">${done}/${lessons.length}</span>
        <div style="flex:1;height:6px;background:#e2e8f0;border-radius:99px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${lc.bar};border-radius:99px"></div>
        </div>
        <span style="font-size:13px;font-weight:800;color:${lc.text}">${pct}%</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:7px">
        ${lessons.map((lesson,i) => {
          const key  = level+'_'+(i+1);
          const isDone = (prog[key]||{}).completed;
          return `<div style="display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;border:1.5px solid ${isDone?lc.bar:'#e2e8f0'};background:${isDone?lc.bg:'#fff'};cursor:pointer" onclick="adminToggleLesson('${uid}','${key}',${isDone})">
            <span style="font-size:18px;flex-shrink:0">${isDone?'✅':'⬜'}</span>
            <span style="font-size:13px;font-weight:${isDone?700:400};color:${isDone?lc.text:'#445566'}">${lesson}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }
  document.getElementById('curr-panel').innerHTML = h;
  window._currUid = uid;
}

async function adminToggleLesson(uid, key, isDone) {
  const sb = getSb(); if (!sb) return;
  const newDone = !isDone;
  await sb.from('curriculum_progress').upsert(
    { user_id:uid, lesson_key:key, completed:newDone, completed_at: newDone?new Date().toISOString():null, updated_at:new Date().toISOString() },
    { onConflict:'user_id,lesson_key' }
  );
  if (!window._adminProgMap[uid]) window._adminProgMap[uid]={};
  window._adminProgMap[uid][key] = { completed:newDone };
  selectCurrUser(uid);
}

function activeSb(id) {
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('on'));
}

// ══ EXPORT / IMPORT / RESET ══════════════════════════════════
function doExport(){
  const data={
    articles: DB,
    siteconf: ls(K_SITECONF,{}),
    opinions: ls(K_OPINIONS,[]),
    phrases:  ls(K_PHRASES,[]),
    wordbank:   ls(K_WORDBANK,[]),
    sentences: ls(K_SENTENCES,[]),
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='korehan-backup.json'; a.click();
  URL.revokeObjectURL(url);
  toast('💾 korehan-backup.json 내보내기 완료');
}
async function doImport(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      // Support both array (old) and object (new) format
      if(Array.isArray(data)){ for(const a of data){ await dbSaveArticle(a); } DB=data; }
      else {
        if(data.articles) { for(const a of data.articles){ await dbSaveArticle(a); } DB=data.articles; }
        if(data.siteconf) lsSet(K_SITECONF, data.siteconf);
        if(data.opinions) lsSet(K_OPINIONS, data.opinions);
        if(data.phrases)  lsSet(K_PHRASES,  data.phrases);
        if(data.wordbank)   lsSet(K_WORDBANK,   data.wordbank);
        if(data.sentences) lsSet(K_SENTENCES, data.sentences);
      }
      goList(); toast('📂 가져오기 완료! (기사 '+DB.length+'개)');
    }catch{ toast('Import failed — invalid JSON', true); }
  };
  reader.readAsText(file);
  e.target.value='';
}
async function resetAll(){
  if(!confirm('모든 데이터를 초기화할까요? 되돌릴 수 없습니다.')) return;
  [K_DB,K_VIEWS,K_PHRASES,K_WORDBANK,K_SITECONF,K_OPINIONS,K_SENTENCES].forEach(k=>localStorage.removeItem(k));
  const reset = SEED.map(s=>({...s,id:uid(),date:today()}));
  for(const a of reset){ await dbSaveArticle(a); }
  DB=reset; goList();
  toast('🔄 전체 초기화 완료');
}
